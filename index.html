<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢對戰：視覺強化版 v7.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 基礎震動 */
        @keyframes strong-shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-10px, 0); } 75% { transform: translate(10px, 0); } }
        /* 繞圈閃避 */
        @keyframes dodge-circle { 0% { transform: rotate(0deg) translate(0); } 50% { transform: rotate(180deg) translate(20px); } 100% { transform: rotate(360deg) translate(0); } }
        /* 背景閃光 */
        @keyframes flash-red { 0%, 100% { background: transparent; } 50% { background: rgba(220, 38, 38, 0.4); } }
        @keyframes flash-yellow { 0%, 100% { background: transparent; } 50% { background: rgba(234, 179, 8, 0.4); } }
        /* 精靈球晃動 */
        @keyframes ball-wiggle { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
        /* 逃跑動畫 */
        @keyframes escape-slide { from { transform: translateX(0) rotate(0); } to { transform: translateX(120vw) rotate(15deg); } }

        .anim-shake { animation: strong-shake 0.1s infinite; }
        .anim-dodge { animation: dodge-circle 0.6s ease-in-out; }
        .anim-flash-red { animation: flash-red 0.3s 3; }
        .anim-flash-yellow { animation: flash-yellow 0.3s 3; }
        .anim-ball { animation: ball-wiggle 0.5s infinite; }
        .anim-escape { animation: escape-slide 3s linear forwards; }

        /* 覆蓋層樣式 */
        #overlay { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); flex-direction: column; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div id="battle-scene" class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-8 items-center">
        <div class="flex flex-col items-center">
            <div id="enemy-sprite" class="w-48 h-48 md:w-64 md:h-64 bg-contain bg-no-repeat bg-center transition-all" style="background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png');"></div>
            <div class="w-full bg-gray-800 h-4 rounded-full mt-4 border border-white relative overflow-hidden">
                <div id="hp-inner" class="bg-green-500 h-full w-full transition-all duration-1000"></div>
            </div>
        </div>
        <div class="flex flex-col items-center">
             <div class="text-4xl font-black mb-4">3 × 2 = <span id="res-val">?</span></div>
             <div id="game-panel" class="w-full h-80 flex items-center justify-center bg-slate-900 rounded-2xl">
                 <button onclick="simulateStep1Win()" class="bg-red-600 px-6 py-3 rounded-lg">測試：第一關過關</button>
             </div>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-48 h-48 md:w-64 md:h-64 bg-contain bg-no-repeat bg-center" style="background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png'); transform: scaleX(-1);"></div>
        </div>
    </div>

    <div id="overlay">
        <div id="overlay-bg" class="absolute inset-0 pointer-events-none"></div>
        <div class="relative z-10 flex items-center justify-center gap-8">
            <div id="overlay-sprite" class="w-64 h-64 bg-contain bg-no-repeat bg-center"></div>
            <div id="overlay-ball" class="hidden w-24 h-24 bg-contain bg-no-repeat bg-center anim-ball" style="background-image:url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png')"></div>
        </div>
        <h2 id="overlay-text" class="mt-12 text-5xl font-black tracking-widest"></h2>
    </div>

    <script>
        const enemyName = "超夢";
        
        // 1. 第一關過關動畫
        function simulateStep1Win() {
            showOverlay();
            const sprite = document.getElementById('overlay-sprite');
            const text = document.getElementById('overlay-text');
            const bg = document.getElementById('overlay-bg');
            
            sprite.className = "w-64 h-64 bg-contain bg-no-repeat bg-center anim-shake";
            bg.className = "absolute inset-0 anim-flash-red";
            text.innerText = "效果絕佳！";
            text.className = "mt-12 text-5xl font-black text-red-500 italic";
            
            // 扣血動畫
            document.getElementById('hp-inner').style.width = "50%";
            
            setTimeout(() => { hideOverlay(); switchToStep2(); }, 2000);
        }

        // 2. 第二關成功收服
        function onCaptureSuccess() {
            showOverlay();
            const sprite = document.getElementById('overlay-sprite');
            const ball = document.getElementById('overlay-ball');
            const text = document.getElementById('overlay-text');
            const bg = document.getElementById('overlay-bg');

            ball.classList.remove('hidden');
            bg.className = "absolute inset-0 anim-flash-yellow";
            text.innerText = `成功收服 "${enemyName}"`;
            text.className = "mt-12 text-4xl font-bold text-yellow-400";
            
            document.getElementById('hp-inner').style.width = "0%";
        }

        // 3. 失敗閃避動畫
        function onCalculationError() {
            showOverlay();
            const sprite = document.getElementById('overlay-sprite');
            const text = document.getElementById('overlay-text');
            
            sprite.className = "w-64 h-64 bg-contain bg-no-repeat bg-center anim-dodge";
            text.innerText = "敵方閃開攻擊了";
            text.className = "mt-12 text-3xl font-bold text-slate-400";
            
            setTimeout(hideOverlay, 1500);
        }

        // 4. 超時逃跑動畫
        function onTimeout() {
            showOverlay();
            const sprite = document.getElementById('overlay-sprite');
            const text = document.getElementById('overlay-text');
            
            sprite.className = "w-64 h-64 bg-contain bg-no-repeat bg-center anim-escape";
            text.innerText = "寶可夢逃跑了";
            text.className = "mt-12 text-4xl font-black text-white";
        }

        function showOverlay() { document.getElementById('overlay').style.display = 'flex'; }
        function hideOverlay() { 
            document.getElementById('overlay').style.display = 'none'; 
            document.getElementById('overlay-ball').classList.add('hidden');
        }
        
        function switchToStep2() {
            document.getElementById('game-panel').innerHTML = `<button onclick="onCaptureSuccess()" class="bg-yellow-500 px-6 py-3 mr-2 rounded text-black">測試：收服成功</button>
                                                               <button onclick="onCalculationError()" class="bg-slate-500 px-6 py-3 rounded">測試：計算錯誤</button>`;
        }
    </script>
</body>
</html>
