<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poké-System v4.6 - UI Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@400;900&display=swap');
        
        body { background: radial-gradient(circle at center, #0a192f 0%, #020617 100%); font-family: 'Orbitron', 'Noto Sans TC', sans-serif; color: #60a5fa; }
        .neon-border { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.3); }
        
        /* 矩陣格式修復 */
        #matrix table { width: 100%; border-collapse: collapse; table-layout: fixed; } /* 固定寬度防止歪掉 */
        #matrix th, #matrix td { 
            border: 1px solid rgba(59, 130, 246, 0.2); 
            text-align: center; 
            padding: 8px 0; 
            font-size: 12px; 
            height: 35px;
        }
        #matrix th { background: rgba(59, 130, 246, 0.1); color: #fff; }

        /* 符號顏色強化 */
        .effect-best { color: #ff4444; text-shadow: 0 0 8px #ff4444; font-size: 14px; } /* ● 絕佳紅色 */
        .effect-weak { color: #3399ff; text-shadow: 0 0 8px #3399ff; font-size: 14px; } /* ▲ 欠佳藍色 */
        .effect-none { color: #94a3b8; font-size: 14px; } /* × 無效灰色 */

        .highlight-col { background-color: rgba(59, 130, 246, 0.3) !important; }
        .stat-bar-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); box-shadow: 0 0 10px #3b82f6; transition: width 0.8s ease; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="p-4 glass-panel flex justify-between items-center border-b border-blue-500/50">
        <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">Strategy_Core <span class="text-xs text-blue-500">v4.6</span></h1>
        <div class="flex gap-4">
            <button onclick="togglePocket()" class="neon-border px-6 py-2 rounded-full bg-blue-900/40 text-sm font-bold text-white hover:bg-blue-600 transition">🎒 POCKET</button>
        </div>
    </header>

    <main class="flex-1 flex p-4 gap-4 overflow-hidden">
        <section class="w-1/4 flex flex-col gap-4">
            <div class="glass-panel flex-1 rounded-3xl neon-border flex flex-col items-center justify-center p-6 relative">
                <img id="enemyImg" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-48 h-48 object-contain">
                <h2 id="enemyName" class="text-2xl font-black mt-6 tracking-widest text-white italic">PIKACHU</h2>
                <div id="enemyTypes" class="flex gap-2 mt-2"></div>
            </div>
            <button onclick="spawnRandomEnemy()" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg transition active:scale-95">INITIATE_SCAN</button>
        </section>

        <section class="w-2/4 flex flex-col glass-panel rounded-3xl neon-border p-6 overflow-hidden">
            <h3 class="text-center text-[10px] tracking-[0.5em] mb-4 text-blue-400">ANALYSIS_MATRIX</h3>
            <div class="flex-1 overflow-auto bg-black/40 rounded-xl" id="matrix"></div>
        </section>

        <section class="w-1/4 flex flex-col gap-4">
            <div class="glass-panel rounded-3xl neon-border p-4 flex-1 flex flex-col overflow-hidden">
                <h3 class="text-xs font-bold mb-4 text-blue-400 uppercase border-l-2 border-blue-500 pl-2">Advisor</h3>
                <div id="recommendationList" class="flex-1 overflow-y-auto space-y-3"></div>
            </div>
        </section>
    </main>

    <div id="pocketModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-8 z-50">
        <div class="glass-panel rounded-[2.5rem] neon-border w-full max-w-6xl h-[85vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-blue-500/30 flex justify-between items-center bg-blue-900/20">
                <h2 class="text-2xl font-black text-white italic">DATA_ARCHIVE</h2>
                <button onclick="togglePocket()" class="text-4xl text-blue-500">&times;</button>
            </div>
            <div class="flex-1 flex overflow-hidden">
                <div id="pocketList" class="w-1/3 border-r border-blue-500/20 overflow-y-auto p-4 space-y-3 bg-blue-900/10"></div>
                <div id="pocketDetail" class="w-2/3 p-10 overflow-y-auto bg-black/40 flex flex-col items-center">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const ALL_TYPES = ["一般","火","水","草","電","冰","格鬥","毒","地面","飛行","超能力","蟲","岩石","幽靈","龍","鋼","惡","妖精"];
        const TYPE_CHART = { /* 數據矩陣邏輯維持不變 */ };

        const db = new Dexie("PokeFutureDB_v46");
        db.version(1).stores({ myPokemon: '++id, name, types, hp, atk, def, speed' });

        // 初始化測試數據 (包含模擬官方圖鑑圖片)
        async function initTestData() {
            const count = await db.myPokemon.count();
            if (count === 0) {
                const testData = [
                    { id: 1, name: "妙蛙種子", types: ["草", "毒"], hp: 45, atk: 49, def: 49, speed: 45 },
                    { id: 4, name: "小火龍", types: ["火"], hp: 39, atk: 52, def: 43, speed: 65 },
                    { id: 7, name: "傑尼龜", types: ["水"], hp: 44, atk: 48, def: 65, speed: 43 },
                    { id: 25, name: "皮卡丘", types: ["電"], hp: 35, atk: 55, def: 40, speed: 90 },
                    { id: 65, name: "胡地", types: ["超能力"], hp: 55, atk: 50, def: 45, speed: 120 }
                ];
                await db.myPokemon.bulkAdd(testData);
            }
        }

        function initMatrix() {
            let html = `<table><thead><tr><th style="width: 40px"></th>`;
            ALL_TYPES.forEach(t => html += `<th>${t.slice(0,1)}</th>`);
            html += `</tr></thead><tbody>`;
            ALL_TYPES.forEach(row => {
                html += `<tr><th>${row.slice(0,1)}</th>`;
                ALL_TYPES.forEach(col => {
                    const val = (TYPE_CHART[row] && TYPE_CHART[row][col]) || 1;
                    let symbol = '';
                    if (val === 2) symbol = '<span class="effect-best">●</span>';
                    else if (val === 0.5) symbol = '<span class="effect-weak">▲</span>';
                    else if (val === 0) symbol = '<span class="effect-none">×</span>';
                    html += `<td class="cell-${col}">${symbol}</td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('matrix').innerHTML = html + `</tbody></table>`;
        }

        // 修改 renderPocket 以顯示圖片
        async function renderPocket() {
            const pokes = await db.myPokemon.toArray();
            const list = document.getElementById('pocketList');
            list.innerHTML = pokes.map(p => `
                <div onclick="showDetail(${p.id})" class="p-3 bg-blue-900/20 rounded-xl border border-blue-500/20 cursor-pointer hover:bg-blue-500/40 flex items-center gap-3">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" class="w-10 h-10 object-contain">
                    <div class="text-sm font-bold text-white">${p.name}</div>
                </div>`).join('');
        }

        async function showDetail(id) {
            const p = await db.myPokemon.get(id);
            document.getElementById('pocketDetail').innerHTML = `
                <div class="flex flex-col items-center w-full animate-fade-in">
                    <div class="neon-border p-6 rounded-full bg-blue-900/20 mb-6">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" class="w-64 h-64 object-contain">
                    </div>
                    <h2 class="text-4xl font-black text-white italic underline mb-6">${p.name}</h2>
                    <div class="w-full max-w-md space-y-4">
                        ${renderBar('HP', p.hp)} ${renderBar('ATK', p.atk)} ${renderBar('DEF', p.def)} ${renderBar('SPD', p.speed)}
                    </div>
                </div>`;
        }

        function renderBar(l, v) {
            return `<div class="text-xs mb-2"><div class="flex justify-between mb-1"><span>${l}</span><span class="text-white">${v}</span></div>
            <div class="h-2 bg-blue-900/50 rounded-full overflow-hidden border border-blue-500/30"><div class="h-full stat-bar-fill" style="width:${(v/150)*100}%"></div></div></div>`;
        }

        function togglePocket() { 
            const m = document.getElementById('pocketModal');
            m.classList.toggle('hidden'); 
            if(!m.classList.contains('hidden')) renderPocket(); 
        }

        // 啟動流程
        (async () => {
            initMatrix();
            await initTestData();
            spawnRandomEnemy();
        })();
    </script>
</body>
</html>
