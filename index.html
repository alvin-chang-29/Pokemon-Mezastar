<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢對戰 v5.0 - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@400;900&display=swap');
        body { background: radial-gradient(circle at center, #0a192f 0%, #020617 100%); font-family: 'Orbitron', 'Noto Sans TC', sans-serif; color: #60a5fa; overflow: hidden; }
        .neon-border { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.3); }
        #matrix table { width: 100%; border-collapse: collapse; table-layout: fixed; color: #94a3b8; }
        #matrix td, #matrix th { border: 1px solid rgba(59, 130, 246, 0.2); text-align: center; font-size: 10px; height: 28px; }
        .highlight-col { background-color: rgba(59, 130, 246, 0.3) !important; color: white; }
        .highlight-row { background-color: rgba(239, 68, 68, 0.1) !important; }
    </style>
</head>
<body class="h-screen flex flex-col p-2">

    <header class="p-3 glass-panel flex justify-between items-center border-b border-blue-500/50 mb-2">
        <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">寶可夢對戰 <span class="text-blue-500 text-xs">v5.0</span></h1>
        <div class="flex gap-4 items-center">
            <div class="text-[10px] text-gray-400 leading-tight">
                ● 效果絕佳 (2x) | ▲ 效果不佳 (0.5x) | × 無效 (0x)
            </div>
            <button onclick="togglePocket()" class="neon-border px-6 py-2 rounded-full bg-blue-900/40 text-sm font-bold text-white hover:bg-blue-600 transition">🎒 背包 (POCKET)</button>
        </div>
    </header>

    <main class="flex-1 flex gap-2 overflow-hidden">
        <section class="w-1/5 flex flex-col gap-2">
            <div class="glass-panel flex-1 rounded-2xl neon-border p-4 flex flex-col items-center justify-center text-center">
                <img id="enemyImg" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-32 h-32 object-contain transition-all">
                <div class="mt-4">
                    <h2 id="enemyZh" class="text-xl font-bold text-white italic">PIKACHU</h2>
                    <p id="enemyEn" class="text-[10px] text-blue-400 uppercase tracking-tighter">Pikachu</p>
                    <p id="enemyJp" class="text-[10px] text-gray-400">ピカチュウ (Pikachu)</p>
                </div>
                <div id="enemyTypes" class="flex gap-1 mt-2"></div>
            </div>
            <button onclick="spawnRandomEnemy()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transition active:scale-95">隨機選擇敵方</button>
        </section>

        <section class="flex-1 flex flex-col glass-panel rounded-2xl neon-border p-4 relative overflow-hidden">
            <div class="text-center text-[10px] text-red-500 font-bold mb-1">↖ 攻擊方 (X軸) ↘</div>
            <div class="flex flex-1 overflow-hidden">
                <div class="text-[10px] text-green-500 font-bold [writing-mode:vertical-lr] flex items-center pr-1 border-r border-green-500/30">↖ 被攻擊方 (Y軸) ↘</div>
                <div class="flex-1 overflow-auto bg-black/40 rounded-xl" id="matrix"></div>
            </div>
        </section>

        <section class="w-1/3 flex flex-col gap-2">
            <div class="glass-panel h-1/2 rounded-2xl neon-border p-3 flex flex-col">
                <h3 class="text-xs font-bold text-blue-400 border-l-2 border-blue-500 pl-2 mb-2">對戰分析 (ADVISOR)</h3>
                <div class="flex-1 overflow-y-auto space-y-2">
                    <div id="defendGroup" class="p-2 bg-blue-900/20 rounded border border-blue-500/20">
                        <p class="text-[10px] text-gray-400">🛡️ 防守組 (受傷最輕):</p>
                        <div id="defList" class="flex flex-wrap gap-1 mt-1"></div>
                    </div>
                    <div id="attackGroup" class="p-2 bg-red-900/10 rounded border border-red-500/20">
                        <p class="text-[10px] text-gray-400">⚔️ 進攻組 (輸出最強):</p>
                        <div id="atkList" class="flex flex-wrap gap-1 mt-1"></div>
                    </div>
                </div>
            </div>

            <div class="glass-panel h-1/2 rounded-2xl neon-border p-4 flex flex-col items-center justify-center">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" class="w-20 h-20 opacity-30">
                <button onclick="alert('請先掃描敵方後點擊對戰！')" class="mt-4 bg-yellow-500 text-blue-900 px-8 py-3 rounded-full font-black text-lg hover:bg-yellow-400">開始對戰</button>
            </div>
        </section>
    </main>

    <div id="pocketModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-8 z-50">
        <div class="glass-panel rounded-[2.5rem] neon-border w-full max-w-5xl h-[80vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-blue-500/30 flex justify-between items-center bg-blue-900/20">
                <h2 class="text-2xl font-black text-white italic tracking-tighter italic">DATA_ARCHIVE</h2>
                <button onclick="togglePocket()" class="text-4xl text-blue-500 hover:text-white">&times;</button>
            </div>
            <div id="pocketList" class="flex-1 overflow-y-auto p-4 grid grid-cols-4 gap-4">
                </div>
        </div>
    </div>

    <script>
        const ALL_TYPES = ["一般","火","水","草","電","冰","格鬥","毒","地面","飛行","超能力","蟲","岩石","幽靈","龍","鋼","惡","妖精"];
        const TYPE_CHART = {
            "一般": {"岩石": 0.5, "幽靈": 0, "鋼": 0.5},
            "火": {"火": 0.5, "水": 0.5, "草": 2, "冰": 2, "蟲": 2, "岩石": 0.5, "龍": 0.5, "鋼": 2},
            "水": {"火": 2, "水": 0.5, "草": 0.5, "地面": 2, "岩石": 2, "龍": 0.5},
            "草": {"火": 0.5, "水": 2, "草": 0.5, "毒": 0.5, "地面": 2, "飛行": 0.5, "蟲": 0.5, "岩石": 2, "龍": 0.5, "鋼": 0.5},
            "電": {"水": 2, "草": 0.5, "電": 0.5, "地面": 0, "飛行": 2, "龍": 0.5},
            "冰": {"火": 0.5, "水": 0.5, "草": 2, "冰": 0.5, "地面": 2, "飛行": 2, "龍": 2, "鋼": 0.5},
            "格鬥": {"一般": 2, "冰": 2, "毒": 0.5, "飛行": 0.5, "超能力": 0.5, "蟲": 0.5, "岩石": 2, "幽靈": 0, "鋼": 2, "妖精": 0.5},
            "毒": {"草": 2, "毒": 0.5, "地面": 0.5, "岩石": 0.5, "幽靈": 0.5, "鋼": 0, "妖精": 2},
            "地面": {"火": 2, "草": 0.5, "電": 2, "毒": 2, "蟲": 0.5, "岩石": 2, "鋼": 2},
            "飛行": {"草": 2, "電": 0.5, "格鬥": 2, "蟲": 2, "岩石": 0.5, "鋼": 0.5},
            "超能力": {"格鬥": 2, "毒": 2, "超能力": 0.5, "鋼": 0.5, "惡": 0},
            "蟲": {"火": 0.5, "草": 2, "格鬥": 0.5, "毒": 0.5, "飛行": 0.5, "超能力": 2, "幽靈": 0.5, "鋼": 0.5, "惡": 2, "妖精": 0.5},
            "岩石": {"火": 2, "冰": 2, "格鬥": 0.5, "地面": 0.5, "飛行": 2, "蟲": 2, "鋼": 0.5},
            "幽靈": {"一般": 0, "超能力": 2, "幽靈": 2, "惡": 0.5},
            "龍": {"龍": 2, "鋼": 0.5, "妖精": 0},
            "鋼": {"火": 0.5, "水": 0.5, "電": 0.5, "冰": 2, "岩石": 2, "鋼": 0.5, "妖精": 2},
            "惡": {"格鬥": 0.5, "超能力": 2, "幽靈": 2, "惡": 0.5, "妖精": 0.5},
            "妖精": {"火": 0.5, "格鬥": 2, "毒": 0.5, "龍": 2, "鋼": 0.5, "惡": 2}
        };

        const db = new Dexie("PokeBattleV5_Final");
        db.version(1).stores({ myPokemon: '++id, zh, types, img' });

        async function initTestData() {
            if (await db.myPokemon.count() === 0) {
                await db.myPokemon.bulkAdd([
                    { zh: "皮卡丘", types: ["電"], img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" },
                    { zh: "妙蛙種子", types: ["草", "毒"], img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" }
                ]);
            }
        }

        function initMatrix() {
            let h = `<table><thead><tr><th></th>`;
            ALL_TYPES.forEach(t => h += `<th>${t.slice(0,1)}</th>`);
            h += `</tr></thead><tbody>`;
            ALL_TYPES.forEach(row => {
                h += `<tr><th class="bg-blue-900/20">${row.slice(0,1)}</th>`;
                ALL_TYPES.forEach(col => {
                    const v = TYPE_CHART[row]?.[col] || 1;
                    const sym = v === 2 ? '<span style="color:#ff4444">●</span>' : v === 0.5 ? '<span style="color:#3399ff">▲</span>' : v === 0 ? '<span style="color:#94a3b8">×</span>' : '';
                    h += `<td class="cell-${col} row-${row}">${sym}</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('matrix').innerHTML = h + `</tbody></table>`;
        }

        async function spawnRandomEnemy() {
            const id = Math.floor(Math.random() * 151) + 1;
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const data = await res.json();
            const types = data.types.map(t => translateType(t.type.name));
            
            document.getElementById('enemyZh').innerText = data.name.toUpperCase();
            document.getElementById('enemyImg').src = data.sprites.other["official-artwork"].front_default;
            document.getElementById('enemyTypes').innerHTML = types.map(t => `<span class="px-2 border border-blue-400 text-[10px] rounded text-blue-400">${t}</span>`).join('');
            
            document.querySelectorAll('td').forEach(el => el.classList.remove('highlight-col', 'highlight-row'));
            types.forEach(t => {
                document.querySelectorAll(`.cell-${t}`).forEach(el => el.classList.add('highlight-col'));
                document.querySelectorAll(`.row-${t}`).forEach(el => el.classList.add('highlight-row'));
            });
            updateAdvisor(types);
        }

        function translateType(en) {
            const m = {"fire":"火","water":"水","grass":"草","electric":"電","ice":"冰","fighting":"格鬥","poison":"毒","ground":"地面","flying":"飛行","psychic":"超能力","bug":"蟲","rock":"岩石","ghost":"幽靈","dragon":"龍","dark":"惡","steel":"鋼","fairy":"妖精","normal":"一般"};
            return m[en] || "一般";
        }

        function updateAdvisor(enemyTypes) {
            let defs = [], atks = [];
            ALL_TYPES.forEach(t => {
                let defScore = 1, atkScore = 1;
                enemyTypes.forEach(enT => {
                    defScore *= (TYPE_CHART[enT]?.[t] || 1);
                    atkScore *= (TYPE_CHART[t]?.[enT] || 1);
                });
                if (defScore < 1) defs.push(t);
                if (atkScore > 1) atks.push(t);
            });
            document.getElementById('defList').innerHTML = defs.slice(0,4).map(t => `<span class="px-2 bg-blue-500/20 rounded text-[10px] text-blue-300">${t}</span>`).join('');
            document.getElementById('atkList').innerHTML = atks.slice(0,4).map(t => `<span class="px-2 bg-red-500/20 rounded text-[10px] text-red-300">${t}</span>`).join('');
        }

        function togglePocket() {
            const m = document.getElementById('pocketModal');
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) renderPocket();
        }

        async function renderPocket() {
            const pokes = await db.myPokemon.toArray();
            document.getElementById('pocketList').innerHTML = pokes.map(p => `
                <div class="glass-panel p-4 rounded-xl text-center">
                    <img src="${p.img}" class="w-16 h-16 mx-auto">
                    <p class="text-xs mt-2">${p.zh}</p>
                </div>`).join('');
        }

        initMatrix();
        initTestData();
    </script>
</body>
</html>
