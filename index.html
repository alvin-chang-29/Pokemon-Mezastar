<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>對戰第一關：方塊定位 - 模組 v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .block-unit {
            width: 30px; height: 30px;
            margin: 2px; border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
        }
        .block-show { transform: scale(1); }
        .bg-yellow-block { background-color: #facc15; box-shadow: 0 0 10px #facc15; }
        .bg-green-block { background-color: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .bg-red-target { background-color: #ef4444; animation: pulse-red 0.5s infinite alternate; }
        
        @keyframes pulse-red { from { transform: scale(1); } to { transform: scale(1.2); } }
        
        .flash-num { animation: flash 0.8s infinite alternate; border-width: 4px !important; }
        @keyframes flash { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-950 text-white flex flex-col items-center justify-center min-h-screen">

    <div class="mb-6 text-center">
        <h2 class="text-xl text-blue-400 font-bold mb-4">第一關：方塊陣型定位</h2>
        <div class="flex items-center gap-4 text-5xl font-black bg-slate-900 p-6 rounded-3xl border-2 border-slate-800">
            <span id="qA" class="text-yellow-400 px-4 py-2 border-2 border-transparent">3</span>
            <span class="text-white">×</span>
            <span id="qB" class="text-green-400 px-4 py-2 border-2 border-transparent">2</span>
            <span>=</span>
            <span id="qResult" class="text-red-500">?</span>
        </div>
    </div>

    <div class="relative bg-slate-900 p-10 rounded-[2rem] shadow-2xl">
        <div id="grid-ui" class="grid grid-cols-10 gap-3">
            </div>
        
        <div id="block-layer" class="absolute top-[115px] left-[115px] pointer-events-none">
            </div>
    </div>

    <script>
        const valA = 3; // 被乘數
        const valB = 2; // 乘數
        let progress = 0; // 0:待點黃, 1:待點綠, 2:待點紅

        function init() {
            const grid = document.getElementById('grid-ui');
            for (let r = 0; r <= 9; r++) {
                for (let c = 0; c <= 9; c++) {
                    const btn = document.createElement('div');
                    btn.className = "w-12 h-12 flex items-center justify-center font-bold text-xl rounded-xl border-2 border-slate-800 transition-all";
                    
                    if (r === 0 && c === 0) { btn.innerText = "×"; }
                    else if (c === 0 && r > 0) {
                        btn.innerText = r;
                        btn.id = `row-${r}`;
                        btn.className += " text-yellow-400 cursor-pointer";
                        if (r === valA) btn.classList.add('flash-num', 'border-yellow-400');
                        btn.onclick = () => clickRow(r);
                    } else if (r === 0 && c > 0) {
                        btn.innerText = c;
                        btn.id = `col-${c}`;
                        btn.className += " text-green-400 opacity-20";
                        btn.onclick = () => clickCol(c);
                    } else {
                        btn.id = `cell-${r}-${c}`;
                        btn.className += " opacity-10 text-xs";
                        btn.innerText = r * c;
                    }
                    grid.appendChild(btn);
                }
            }
        }

        function clickRow(r) {
            if (progress === 0 && r === valA) {
                progress = 1;
                document.getElementById(`row-${r}`).classList.remove('flash-num');
                document.getElementById(`col-${valB}`).classList.remove('opacity-20');
                document.getElementById(`col-${valB}`).classList.add('flash-num', 'border-green-400');
                // 畫出第一排黃色方塊
                showBlocks('yellow');
            }
        }

        function clickCol(c) {
            if (progress === 1 && c === valB) {
                progress = 2;
                document.getElementById(`col-${c}`).classList.remove('flash-num');
                // 畫出完整綠色矩陣
                showBlocks('green');
                // 激活交叉點
                const target = document.getElementById(`cell-${valA}-${valB}`);
                target.classList.replace('opacity-10', 'flash-num');
                target.classList.add('bg-red-target', 'text-white', 'opacity-100', 'z-50');
                target.onclick = () => { if(progress===2) finish(); };
            }
        }

        function showBlocks(color) {
            const container = document.getElementById('block-layer');
            if (color === 'yellow') {
                for (let i = 0; i < valA; i++) {
                    const b = document.createElement('div');
                    b.className = "block-unit bg-yellow-block block-show";
                    b.style.position = 'absolute';
                    b.style.top = `${i * 60}px`;
                    b.style.left = `0px`;
                    container.appendChild(b);
                }
            } else {
                for (let j = 1; j < valB; j++) {
                    for (let i = 0; i < valA; i++) {
                        const b = document.createElement('div');
                        b.className = "block-unit bg-green-block";
                        b.style.position = 'absolute';
                        b.style.top = `${i * 60}px`;
                        b.style.left = `${j * 60}px`;
                        container.appendChild(b);
                        setTimeout(() => b.classList.add('block-show'), j * 100);
                    }
                }
            }
        }

        function finish() {
            document.getElementById('qResult').innerText = valA * valB;
            alert("第一關完成！方塊陣型已解開，進入第二關計算捕獲！");
        }

        init();
    </script>
</body>
</html>
