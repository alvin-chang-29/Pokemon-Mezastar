<style>
    /* 過場專用 HP 條容器 */
    .overlay-hp-container {
        width: 300px;
        height: 12px;
        background: #1e293b;
        border: 2px solid white;
        border-radius: 999px;
        margin-top: 20px;
        overflow: hidden;
    }
    #overlay-hp-bar {
        height: 100%;
        background: #3b82f6; /* 我方藍色 HP */
        width: 100%;
        transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
</style>

<div id="overlay">
    <div id="overlay-flash" class="absolute inset-0 pointer-events-none"></div>
    <div class="flex flex-col items-center">
        <div class="flex items-center justify-center gap-6">
            <div id="overlay-img" class="overlay-sprite"></div>
            <div id="overlay-ball" class="hidden w-24 h-24 bg-contain bg-no-repeat bg-center anim-ball" style="background-image:url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png')"></div>
        </div>
        
        <div id="overlay-hp-box" class="hidden flex flex-col items-center">
            <div class="overlay-hp-container">
                <div id="overlay-hp-bar"></div>
            </div>
            <p class="text-blue-400 text-sm mt-2 font-bold">PIKACHU HP</p>
        </div>

        <h2 id="overlay-msg" class="mt-8 text-5xl font-black tracking-widest text-center"></h2>
    </div>
</div>

<script>
    // 獲取主畫面與過場畫面的 HP 元素
    const mainPlayerHp = document.getElementById('player-hp');
    const overlayHpBox = document.getElementById('overlay-hp-box');
    const overlayHpBar = document.getElementById('overlay-hp-bar');
    let currentPlayerHp = 100; // 初始血量

    // --- 3. 敵方攻擊 (算錯時觸發) ---
    function triggerEnemyAttack() {
        showOverlay();
        
        // 1. 設定過場內容：我方寶可夢居中
        overlayImg.style.backgroundImage = `url('${playerImg}')`;
        overlayImg.style.transform = "scaleX(-1)"; 
        overlayImg.className = "overlay-sprite anim-shake"; 
        overlayFlash.className = "absolute inset-0 anim-flash-red"; 
        
        // 2. 顯示並重置過場 HP 條
        overlayHpBox.classList.remove('hidden');
        overlayHpBar.style.width = currentPlayerHp + "%"; // 先設為當前血量
        
        overlayMsg.innerText = "敵方攻擊！";
        overlayMsg.className = "mt-8 text-5xl font-black text-white";

        // 3. 延遲 0.3 秒後開始掉血動畫 (模擬被打到的反應)
        setTimeout(() => {
            currentPlayerHp = Math.max(0, currentPlayerHp - 50); // 減少一半
            overlayHpBar.style.width = currentPlayerHp + "%";
            
            // 同步更新主畫面 HP 條
            mainPlayerHp.style.width = currentPlayerHp + "%";
            
            // 如果血量過低，條色變紅 (可選視覺強化)
            if(currentPlayerHp <= 20) overlayHpBar.style.backgroundColor = "#ef4444";
        }, 300);

        // 4. 2.5 秒後關閉過場，讓孩子看清楚血量減少的過程
        setTimeout(hideOverlay, 2500);
    }

    function hideOverlay() { 
        overlay.style.display = 'none'; 
        overlayHpBox.classList.add('hidden'); // 隱藏過場 HP
        document.getElementById('overlay-ball').classList.add('hidden');
        overlayImg.style.transform = ""; 
    }
</script>
