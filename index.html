<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢對戰 v5.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@400;900&display=swap');
        body { background: radial-gradient(circle at center, #0a192f 0%, #020617 100%); font-family: 'Orbitron', 'Noto Sans TC', sans-serif; color: #60a5fa; overflow: hidden; }
        .neon-border { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.3); }
        /* 矩陣格式嚴格校正 */
        #matrix table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        #matrix td, #matrix th { border: 1px solid rgba(59, 130, 246, 0.2); text-align: center; height: 30px; font-size: 10px; padding: 0; }
        .highlight-col { background-color: rgba(59, 130, 246, 0.3) !important; }
        .numpad-btn { @apply bg-blue-900/60 border border-blue-500/50 py-3 rounded-xl font-bold active:bg-blue-400 transition; }
    </style>
</head>
<body class="h-screen flex flex-col p-2">

    <header class="p-3 glass-panel flex justify-between items-center border-b border-blue-500/50 mb-2">
        <h1 class="text-xl font-black italic text-white tracking-tighter">寶可夢對戰 <span class="text-blue-500 text-xs tracking-widest">v5.3</span></h1>
        <div class="flex gap-4 items-center text-xs">
            <div class="text-gray-400">● 絕佳(2x) | ▲ 不佳(0.5x) | × 無效</div>
            <button onclick="togglePocket()" class="neon-border px-6 py-2 rounded-full bg-blue-900/40 font-bold text-white hover:bg-blue-600 transition">🎒 我的寶可夢們</button>
        </div>
    </header>

    <main class="flex-1 flex gap-2 overflow-hidden">
        <section class="w-1/5 flex flex-col gap-2">
            <div id="enemyPanel" class="glass-panel flex-1 rounded-2xl neon-border p-4 flex flex-col items-center justify-center text-center transition-transform duration-700">
                <img id="enemyImg" src="" class="w-32 h-32 object-contain drop-shadow-[0_0_15px_rgba(59, 130, 246, 0.5)]">
                <div class="mt-4">
                    <h2 id="enemyZh" class="text-2xl font-black text-white">---</h2> <p id="enemyEn" class="text-[10px] text-blue-400 uppercase">---</p>
                    <p id="enemyJp" class="text-[10px] text-gray-500">---</p>
                </div>
                <div id="enemyTypes" class="flex gap-1 mt-2"></div>
            </div>
            <button onclick="spawnRandomEnemy()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transition active:scale-95">隨機選擇敵方</button>
        </section>

        <section class="flex-1 flex flex-col glass-panel rounded-2xl neon-border p-4 relative overflow-hidden">
            <div class="text-center text-red-500 font-black text-xs mb-1">↖ 攻擊方 (X軸) ↘</div>
            <div class="flex flex-1 overflow-hidden">
                <div class="text-green-500 font-black text-xs [writing-mode:vertical-lr] flex items-center pr-1 border-r border-green-500/30">↖ 被攻擊方 (Y軸) ↘</div>
                <div class="flex-1 overflow-auto bg-black/40 rounded-xl" id="matrix"></div>
            </div>
        </section>

        <section class="w-1/3 flex flex-col gap-2">
            <div class="glass-panel h-1/3 rounded-2xl neon-border p-3 flex flex-col overflow-hidden text-xs">
                <h3 class="font-bold text-blue-400 border-l-2 border-blue-500 pl-2 mb-2">對戰建議 (ADVISOR)</h3>
                <div id="defendGroup" class="p-2 bg-blue-900/20 rounded border border-blue-500/20 mb-2">
                    <span class="text-gray-400 font-bold">🛡️ 最佳防守建議:</span> <span id="defList" class="text-blue-300 ml-1">---</span>
                </div>
                <div id="attackGroup" class="p-2 bg-red-900/10 rounded border border-red-500/20">
                    <span class="text-gray-400 font-bold">⚔️ 最佳進攻建議:</span> <span id="atkList" class="text-red-300 ml-1">---</span>
                </div>
                <button onclick="togglePocket()" class="w-full py-1 border border-dashed border-blue-500/50 rounded text-blue-400 mt-2 text-[10px]">➕ 自行選擇戰士</button>
            </div>

            <div id="battleZone" class="glass-panel flex-1 rounded-2xl neon-border p-4 flex flex-col items-center justify-center relative">
                <div id="mathQuiz" class="hidden w-full text-center">
                    <div id="timerDisplay" class="text-red-500 font-black text-2xl mb-1 italic">20.0s</div>
                    <div id="quizText" class="text-4xl font-black text-white mb-4">---</div>
                    <input type="number" id="mathInput" readonly class="w-full bg-blue-900/40 border-2 border-blue-500 rounded p-1 text-center text-3xl text-white mb-2">
                    <div class="grid grid-cols-3 gap-2 w-full max-w-xs mx-auto" id="numpad">
                        <button onclick="pressNum(1)" class="numpad-btn">1</button><button onclick="pressNum(2)" class="numpad-btn">2</button><button onclick="pressNum(3)" class="numpad-btn">3</button>
                        <button onclick="pressNum(4)" class="numpad-btn">4</button><button onclick="pressNum(5)" class="numpad-btn">5</button><button onclick="pressNum(6)" class="numpad-btn">6</button>
                        <button onclick="pressNum(7)" class="numpad-btn">7</button><button onclick="pressNum(8)" class="numpad-btn">8</button><button onclick="pressNum(9)" class="numpad-btn">9</button>
                        <button onclick="pressNum('C')" class="numpad-btn text-red-400">C</button><button onclick="pressNum(0)" class="numpad-btn">0</button><button onclick="checkAns()" class="numpad-btn text-green-400">OK</button>
                    </div>
                </div>
                <div id="myPokeDisplay" class="text-center">
                    <div class="relative inline-block mb-4">
                        <img id="myActiveImg" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-24 h-24 mx-auto drop-shadow-[0_0_10px_gold]">
                        <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[10px] px-2 rounded-full border border-white" id="activePokeName">皮卡丘</span>
                    </div>
                    <button onclick="startBattle()" class="bg-yellow-500 text-blue-900 px-12 py-3 rounded-full font-black text-xl hover:bg-yellow-400 shadow-xl transition">開始對戰</button>
                </div>
            </div>
        </section>
    </main>

    <div id="pocketModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-8 z-50">
        <div class="glass-panel rounded-[2.5rem] neon-border w-full max-w-5xl h-[80vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-blue-500/30 flex justify-between items-center bg-blue-900/20">
                <h2 class="text-2xl font-black text-white">我的寶可夢們</h2>
                <button onclick="togglePocket()" class="text-4xl text-blue-500">&times;</button>
            </div>
            <div id="pocketList" class="flex-1 overflow-y-auto p-6 grid grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </div>
    </div>

    <div id="captureModal" class="fixed inset-0 bg-black/90 hidden flex flex-col items-center justify-center z-[200]">
        <img id="capturedImg" src="" class="w-64 h-64 animate-bounce">
        <h2 class="text-4xl font-black text-yellow-400 mt-8 italic">捕獲寶可夢！</h2>
        <button onclick="closeCapture()" class="mt-10 bg-blue-600 px-16 py-4 rounded-full text-white font-bold text-xl">收回背包</button>
    </div>

    <script>
        const ALL_TYPES = ["一般","火","水","草","電","冰","格鬥","毒","地面","飛行","超能力","蟲","岩石","幽靈","龍","鋼","惡","妖精"];
        const TYPE_CHART = { /* 同前 ... */ };

        const db = new Dexie("PokeBattleV5_3");
        db.version(1).stores({ myPokemon: '++id, zh, img, types' });

        let currentEnemy = null;
        let quizAns = 0;
        let battleStartTime = 0;
        let timerInterval = null;
        let enemyHP = 100;

        async function init() {
            initMatrix();
            if (await db.myPokemon.count() === 0) {
                await db.myPokemon.add({ zh: "皮卡丘", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png", types: ["電"] });
            }
            spawnRandomEnemy();
        }

        function initMatrix() {
            let h = `<table><thead><tr><th style="width:30px"></th>`;
            ALL_TYPES.forEach(t => h += `<th>${t.slice(0,1)}</th>`);
            h += `</tr></thead><tbody>`;
            ALL_TYPES.forEach(row => {
                h += `<tr><th class="bg-blue-900/30">${row.slice(0,1)}</th>`;
                ALL_TYPES.forEach(col => {
                    const v = (TYPE_CHART[row] && TYPE_CHART[row][col]) || 1;
                    const sym = v === 2 ? '<span style="color:#ff4444">●</span>' : v === 0.5 ? '<span style="color:#3399ff">▲</span>' : v === 0 ? '<span style="color:#94a3b8">×</span>' : '';
                    h += `<td class="cell-${col}">${sym}</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('matrix').innerHTML = h + `</tbody></table>`;
        }

        async function spawnRandomEnemy() {
            const id = Math.floor(Math.random() * 1025) + 1;
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const data = await res.json();
            const specRes = await fetch(data.species.url);
            const specData = await specRes.json();
            
            const zh = specData.names.find(n => n.language.name === "zh-Hant")?.name || data.name;
            const jp = specData.names.find(n => n.language.name === "ja")?.name || "";
            const types = data.types.map(t => translateType(t.type.name));

            currentEnemy = { zh, en: data.name, jp, types, img: data.sprites.other["official-artwork"].front_default };
            enemyHP = 100;

            document.getElementById('enemyZh').innerText = zh; // 中文白字
            document.getElementById('enemyEn').innerText = data.name;
            document.getElementById('enemyJp').innerText = jp;
            document.getElementById('enemyImg').src = currentEnemy.img;
            document.getElementById('enemyPanel').style.transform = "translateX(0)";
            document.getElementById('enemyTypes').innerHTML = types.map(t => `<span class="px-2 border border-blue-400 text-[8px] rounded text-blue-400">${t}</span>`).join('');
            
            highlightMatrix(types);
            updateAdvisor(types);
        }

        function translateType(en) {
            const m = {"fire":"火","water":"水","grass":"草","electric":"電","ice":"冰","fighting":"格鬥","poison":"毒","ground":"地面","flying":"飛行","psychic":"超能力","bug":"蟲","rock":"岩石","ghost":"幽靈","dragon":"龍","dark":"惡","steel":"鋼","fairy":"妖精","normal":"一般"};
            return m[en] || "一般";
        }

        function highlightMatrix(types) {
            document.querySelectorAll('td').forEach(el => el.classList.remove('highlight-col'));
            types.forEach(t => document.querySelectorAll(`.cell-${t}`).forEach(el => el.classList.add('highlight-col')));
        }

        function updateAdvisor(enemyTypes) {
            let defs = [], atks = [];
            ALL_TYPES.forEach(t => {
                let dScore = 1, aScore = 1;
                enemyTypes.forEach(enT => { dScore *= (TYPE_CHART[enT]?.[t] || 1); aScore *= (TYPE_CHART[t]?.[enT] || 1); });
                if (dScore < 1) defs.push(t);
                if (aScore > 1) atks.push(t);
            });
            document.getElementById('defList').innerText = defs.join(' ');
            document.getElementById('atkList').innerText = atks.join(' ');
        }

        function startBattle() {
            if (!currentEnemy) return;
            document.getElementById('myPokeDisplay').classList.add('hidden');
            document.getElementById('mathQuiz').classList.remove('hidden');
            newQuiz();
        }

        function newQuiz() {
            let a = Math.floor(Math.random() * 80) + 10;
            let b = Math.floor(Math.random() * 9) + 1;
            let op = Math.random() > 0.5 ? '+' : '-';
            quizAns = op === '+' ? a + b : a - b;
            document.getElementById('quizText').innerText = `${a} ${op} ${b} = ?`;
            document.getElementById('mathInput').value = "";
            battleStartTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 100);
        }

        function updateTimer() {
            let elapsed = (Date.now() - battleStartTime) / 1000;
            let remain = Math.max(0, 20 - elapsed);
            document.getElementById('timerDisplay').innerText = `${remain.toFixed(1)}s`;
            if (remain <= 0) { clearInterval(timerInterval); enemyEscape(); }
        }

        function pressNum(n) {
            const i = document.getElementById('mathInput');
            if (n === 'C') i.value = ""; else i.value += n;
        }

        function checkAns() {
            if (parseInt(document.getElementById('mathInput').value) === quizAns) {
                let timeSpent = (Date.now() - battleStartTime) / 1000;
                if (timeSpent <= 10) captureSequence(); // 10秒內 KO
                else if (timeSpent <= 15) { 
                    enemyHP -= 50; 
                    if (enemyHP <= 0) captureSequence(); 
                    else { alert("命中！敵方HP減半，再一題！"); newQuiz(); } 
                } else { alert("太慢了，繼續努力！"); newQuiz(); }
            } else { alert("錯誤！"); document.getElementById('mathInput').value = ""; }
        }

        function enemyEscape() {
            document.getElementById('enemyPanel').style.transform = "translateX(-200%)";
            setTimeout(() => { alert("時間到，寶可夢逃走了！"); resetBattle(); spawnRandomEnemy(); }, 500);
        }

        async function captureSequence() {
            clearInterval(timerInterval);
            await db.myPokemon.add(currentEnemy);
            document.getElementById('capturedImg').src = currentEnemy.img;
            document.getElementById('captureModal').classList.remove('hidden');
        }

        function closeCapture() {
            document.getElementById('captureModal').classList.add('hidden');
            resetBattle();
            spawnRandomEnemy();
        }

        function resetBattle() {
            document.getElementById('mathQuiz').classList.add('hidden');
            document.getElementById('myPokeDisplay').classList.remove('hidden');
        }

        function togglePocket() {
            const m = document.getElementById('pocketModal');
            m.classList.toggle('hidden');
            if (!m.classList.contains('hidden')) renderPocket();
        }

        async function renderPocket() {
            const pokes = await db.myPokemon.toArray();
            document.getElementById('pocketList').innerHTML = pokes.map(p => `
                <div onclick="selectWarrior(${p.id})" class="glass-panel p-3 rounded-2xl text-center border border-blue-500/20 cursor-pointer">
                    <img src="${p.img}" class="w-16 h-16 mx-auto">
                    <p class="text-[10px] mt-1 text-white">${p.zh}</p>
                </div>`).join('');
        }

        async function selectWarrior(id) {
            const p = await db.myPokemon.get(id);
            document.getElementById('myActiveImg').src = p.img;
            document.getElementById('activePokeName').innerText = p.zh;
            togglePocket();
        }

        init();
    </script>
</body>
</html>
