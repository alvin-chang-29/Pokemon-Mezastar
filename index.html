<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢屬性分析儀 - 模組測試 v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 符號置於 z-index: 100 避免被亮帶遮蓋 */
        .symbol {
            position: relative;
            z-index: 100;
            font-weight: bold;
            font-size: 1.2rem;
        }
        /* 亮帶 Alpha 值處理 */
        .highlight-row { background-color: rgba(239, 68, 68, 0.15) !important; } /* 紅色亮帶 */
        .highlight-col { background-color: rgba(59, 130, 246, 0.15) !important; } /* 藍色亮帶 */
        .highlight-cross { background-color: rgba(234, 179, 8, 0.3) !important; } /* 交叉點黃色 */
        
        .type-cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e5e7eb;
            transition: background-color 0.2s;
            cursor: crosshair;
        }
        .type-header {
            writing-mode: vertical-lr;
            text-orientation: upright;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden">
        <div class="bg-red-600 text-white p-4 text-center">
            <h1 class="text-2xl font-bold tracking-widest">屬性分析儀 (V6.0+)</h1>
            <p class="text-sm opacity-80">十字定位系統：水平(攻擊方) x 垂直(被攻擊方)</p>
        </div>

        <div class="overflow-x-auto p-4 flex justify-center">
            <div id="type-grid" class="grid grid-cols-[auto_repeat(18,_minmax(40px,_1fr))] border-l border-t">
                <div class="bg-gray-200 border-b border-r p-2 flex items-center justify-center font-bold text-xs">被\攻</div>
                </div>
        </div>

        <div class="bg-gray-50 p-4 border-t flex flex-wrap justify-center gap-6 text-sm">
            <div class="flex items-center"><span class="text-red-500 mr-2">●</span> 效果絕佳 (2x)</div>
            <div class="flex items-center"><span class="text-blue-500 mr-2">▲</span> 效果欠佳 (0.5x)</div>
            <div class="flex items-center"><span class="text-gray-400 mr-2">×</span> 幾乎沒有效果 (0x)</div>
            <div class="flex items-center"><span class="w-4 h-4 border border-gray-300 mr-2"></span> 普通效果 (1x)</div>
        </div>
    </div>

    <script>
        const types = ['一般', '格鬥', '飛行', '毒', '地上', '岩石', '蟲', '幽靈', '鋼', '炎', '水', '草', '電', '超能力', '冰', '龍', '惡', '妖精'];
        
        // 簡化版相剋資料 (範例)
        const relations = {
            '格鬥': { '一般': '●', '岩石': '●', '鋼': '●', '冰': '●', '惡': '●', '飛行': '▲', '毒': '▲', '蟲': '▲', '超能力': '▲', '妖精': '▲', '幽靈': '×' },
            '炎': { '蟲': '●', '鋼': '●', '草': '●', '冰': '●', '岩石': '▲', '炎': '▲', '水': '▲', '龍': '▲' },
            // ... 其他資料可在此擴充
        };

        const grid = document.getElementById('type-grid');

        // 1. 生成頂部攻擊方標題
        types.forEach(t => {
            const el = document.createElement('div');
            el.className = 'bg-red-50 border-b border-r p-1 text-center font-bold text-red-700 flex items-center justify-center text-xs h-12';
            el.innerText = t;
            el.dataset.col = t;
            grid.appendChild(el);
        });

        // 2. 生成每一行 (被攻擊方)
        types.forEach((defType, rowIndex) => {
            // 行首屬性名
            const rowHeader = document.createElement('div');
            rowHeader.className = 'bg-blue-50 border-b border-r p-2 font-bold text-blue-700 flex items-center justify-center text-xs w-12';
            rowHeader.innerText = defType;
            rowHeader.dataset.row = defType;
            grid.appendChild(rowHeader);

            // 生成該行的 18 個格子
            types.forEach((atkType, colIndex) => {
                const cell = document.createElement('div');
                cell.className = 'type-cell border-b border-r';
                cell.dataset.row = defType;
                cell.dataset.col = atkType;

                // 填入符號
                let symbol = '';
                if (relations[atkType] && relations[atkType][defType]) {
                    symbol = relations[atkType][defType];
                }
                
                const span = document.createElement('span');
                span.className = 'symbol ' + (symbol === '●' ? 'text-red-500' : symbol === '▲' ? 'text-blue-500' : 'text-gray-400');
                span.innerText = symbol;
                cell.appendChild(span);

                // 十字高亮邏輯實作
                cell.addEventListener('mouseenter', () => highlight(defType, atkType));
                cell.addEventListener('mouseleave', clearHighlight);

                grid.appendChild(cell);
            });
        });

        function highlight(rowName, colName) {
            clearHighlight();
            // 高亮行
            document.querySelectorAll(`[data-row="${rowName}"]`).forEach(el => el.classList.add('highlight-row'));
            // 高亮列
            document.querySelectorAll(`[data-col="${colName}"]`).forEach(el => el.classList.add('highlight-col'));
            // 高亮交叉點
            const cross = document.querySelector(`[data-row="${rowName}"][data-col="${colName}"]`);
            if (cross) cross.classList.add('highlight-cross');
        }

        function clearHighlight() {
            document.querySelectorAll('.highlight-row').forEach(el => el.classList.remove('highlight-row'));
            document.querySelectorAll('.highlight-col').forEach(el => el.classList.remove('highlight-col'));
            document.querySelectorAll('.highlight-cross').forEach(el => el.classList.remove('highlight-cross'));
        }
    </script>
</body>
</html>
