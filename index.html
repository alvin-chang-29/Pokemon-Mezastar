<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Poké-System v4.5 Test_Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@400;900&display=swap');
        body { background: radial-gradient(circle at center, #0a192f 0%, #020617 100%); font-family: 'Orbitron', 'Noto Sans TC', sans-serif; color: #60a5fa; }
        .neon-border { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.3); }
        .stat-bar-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); box-shadow: 0 0 10px #3b82f6; transition: width 0.8s ease; }
        #matrix td, #matrix th { border: 1px solid rgba(59, 130, 246, 0.2); text-align: center; padding: 5px 0; font-size: 10px; }
        .highlight-col { background-color: rgba(59, 130, 246, 0.4) !important; color: white; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="p-4 glass-panel flex justify-between items-center border-b border-blue-500/50">
        <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">Strategy_Core <span class="text-xs text-blue-500">v4.5_TEST</span></h1>
        <div class="flex gap-4">
            <button onclick="toggleManual()" class="neon-border px-4 py-2 rounded-full text-xs font-bold text-blue-300">❔ MANUAL</button>
            <button onclick="togglePocket()" class="neon-border px-6 py-2 rounded-full bg-blue-900/40 text-sm font-bold text-white hover:bg-blue-600">🎒 POCKET</button>
        </div>
    </header>

    <main class="flex-1 flex p-4 gap-4 overflow-hidden">
        <section class="w-1/4 flex flex-col gap-4">
            <div class="glass-panel flex-1 rounded-3xl neon-border flex flex-col items-center justify-center p-6 relative">
                <div class="absolute top-0 w-full h-1 bg-blue-400/50 animate-pulse shadow-[0_0_15px_blue]"></div>
                <img id="enemyImg" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-48 h-48 object-contain z-10 drop-shadow-[0_0_20px_#3b82f6]">
                <h2 id="enemyName" class="text-2xl font-black mt-6 tracking-widest text-white italic">PIKACHU</h2>
                <div id="enemyTypes" class="flex gap-2 mt-2"></div>
            </div>
            <button onclick="spawnRandomEnemy()" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg transition active:scale-95">INITIATE_SCAN</button>
        </section>

        <section class="w-2/4 flex flex-col glass-panel rounded-3xl neon-border p-4">
            <h3 class="text-center text-[10px] tracking-[0.5em] mb-4 text-blue-400">ANALYSIS_MATRIX</h3>
            <div class="flex-1 overflow-auto rounded-xl bg-black/40 p-2" id="matrix"></div>
        </section>

        <section class="w-1/4 flex flex-col gap-4">
            <div class="glass-panel rounded-3xl neon-border p-4 flex-1 flex flex-col">
                <h3 class="text-xs font-bold mb-4 text-blue-400 uppercase border-l-2 border-blue-500 pl-2">Advisor</h3>
                <div id="recommendationList" class="flex-1 overflow-y-auto space-y-3"></div>
            </div>
        </section>
    </main>

    <div id="pocketModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-8 z-50">
        <div class="glass-panel rounded-[2.5rem] neon-border w-full max-w-6xl h-[85vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-blue-500/30 flex justify-between items-center bg-blue-900/20">
                <h2 class="text-2xl font-black text-white italic">DATA_ARCHIVE</h2>
                <button onclick="togglePocket()" class="text-4xl text-blue-500 hover:text-white">&times;</button>
            </div>
            <div class="flex-1 flex overflow-hidden">
                <div id="pocketList" class="w-1/3 border-r border-blue-500/20 overflow-y-auto p-4 space-y-3 bg-blue-900/10"></div>
                <div id="pocketDetail" class="w-2/3 p-10 overflow-y-auto bg-black/40 relative">
                    <p class="text-blue-500/30 text-center mt-32 italic">SELECT_DATA_UNIT</p>
                </div>
            </div>
        </div>
    </div>

    <div id="manualModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-8 z-[100]">
        <div class="glass-panel rounded-[2rem] neon-border w-full max-w-4xl h-[80vh] flex flex-col overflow-hidden p-8 overflow-y-auto">
             <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-white italic">SYSTEM_MANUAL</h2>
                <button onclick="toggleManual()" class="text-3xl text-blue-500">&times;</button>
             </div>
             <div class="space-y-6 text-sm text-gray-300">
                <div class="p-4 bg-blue-900/20 rounded-xl border border-blue-500/30">
                    <h4 class="text-blue-400 font-bold mb-2">如何測試？</h4>
                    <p>App 已內建測試資料。直接按 <b class="text-white">INITIATE_SCAN</b> 即可看到屬性分析，或按 <b class="text-white">POCKET</b> 查看存貨。</p>
                </div>
                
             </div>
        </div>
    </div>

    <script>
        const ALL_TYPES = ["一般","火","水","草","電","冰","格鬥","毒","地面","飛行","超能力","蟲","岩石","幽靈","龍","鋼","惡","妖精"];
        const TYPE_CHART = {
            "一般": {"岩石": 0.5, "幽靈": 0, "鋼": 0.5}, "火": {"火": 0.5, "水": 0.5, "草": 2, "冰": 2, "蟲": 2, "岩石": 0.5, "龍": 0.5, "鋼": 2},
            "水": {"火": 2, "水": 0.5, "草": 0.5, "地面": 2, "岩石": 2, "龍": 0.5}, "草": {"火": 0.5, "水": 2, "草": 0.5, "毒": 0.5, "地面": 2, "飛行": 0.5, "蟲": 0.5, "岩石": 2, "龍": 0.5, "鋼": 0.5},
            "電": {"水": 2, "草": 0.5, "電": 0.5, "地面": 0, "飛行": 2, "龍": 0.5}, "冰": {"火": 0.5, "水": 0.5, "草": 2, "冰": 0.5, "地面": 2, "飛行": 2, "龍": 2, "鋼": 0.5},
            "格鬥": {"一般": 2, "冰": 2, "毒": 0.5, "飛行": 0.5, "超能力": 0.5, "蟲": 0.5, "岩石": 2, "幽靈": 0, "鋼": 2, "妖精": 0.5}, "毒": {"草": 2, "毒": 0.5, "地面": 0.5, "岩石": 0.5, "幽靈": 0.5, "鋼": 0, "妖精": 2},
            "地面": {"火": 2, "草": 0.5, "電": 2, "毒": 2, "蟲": 0.5, "岩石": 2, "鋼": 2}, "飛行": {"草": 2, "電": 0.5, "格鬥": 2, "蟲": 2, "岩石": 0.5, "鋼": 0.5},
            "超能力": {"格鬥": 2, "毒": 2, "超能力": 0.5, "鋼": 0.5, "惡": 0}, "蟲": {"火": 0.5, "草": 2, "格鬥": 0.5, "毒": 0.5, "飛行": 0.5, "超能力": 2, "幽靈": 0.5, "鋼": 0.5, "惡": 2, "妖精": 0.5},
            "岩石": {"火": 2, "冰": 2, "格鬥": 0.5, "地面": 0.5, "飛行": 2, "蟲": 2, "鋼": 0.5}, "幽靈": {"一般": 0, "超能力": 2, "幽靈": 2, "惡": 0.5},
            "龍": {"龍": 2, "鋼": 0.5, "妖精": 0}, "鋼": {"火": 0.5, "水": 0.5, "電": 0.5, "冰": 2, "岩石": 2, "鋼": 0.5, "妖精": 2},
            "惡": {"格鬥": 0.5, "超能力": 2, "幽靈": 2, "惡": 0.5, "妖精": 0.5}, "妖精": {"火": 0.5, "格鬥": 2, "毒": 0.5, "龍": 2, "鋼": 0.5, "惡": 2}
        };

        const db = new Dexie("PokeFutureDB_v45");
        db.version(1).stores({ myPokemon: '++id, name, types, hp, atk, def, spAtk, spDef, speed' });

        // --- 核心修復：內建測試數據 ---
        async function initTestData() {
            const count = await db.myPokemon.count();
            if (count === 0) {
                const testData = [
                    { name: "妙蛙種子", types: ["草", "毒"], hp: 45, atk: 49, def: 49, spAtk: 65, spDef: 65, speed: 45 },
                    { name: "小火龍", types: ["火"], hp: 39, atk: 52, def: 43, spAtk: 60, spDef: 50, speed: 65 },
                    { name: "傑尼龜", types: ["水"], hp: 44, atk: 48, def: 65, spAtk: 50, spDef: 64, speed: 43 },
                    { name: "皮卡丘", types: ["電"], hp: 35, atk: 55, def: 40, spAtk: 50, spDef: 50, speed: 90 },
                    { name: "胡地", types: ["超能力"], hp: 55, atk: 50, def: 45, spAtk: 135, spDef: 95, speed: 120 }
                ];
                await db.myPokemon.bulkAdd(testData);
                console.log("測試數據已載入");
            }
        }

        function initMatrix() {
            let html = `<table><thead><tr><th></th>`;
            ALL_TYPES.forEach(t => html += `<th>${t.slice(0,1)}</th>`);
            html += `</tr></thead><tbody>`;
            ALL_TYPES.forEach(row => {
                html += `<tr><th class="bg-blue-900/30">${row.slice(0,1)}</th>`;
                ALL_TYPES.forEach(col => {
                    const val = TYPE_CHART[row][col] || 1;
                    const char = val === 2 ? '●' : val === 0.5 ? '▲' : val === 0 ? '×' : '';
                    html += `<td class="cell-${col}">${char}</td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('matrix').innerHTML = html + `</tbody></table>`;
        }

        async function spawnRandomEnemy() {
            const id = Math.floor(Math.random() * 151) + 1;
            const res = await fetch(`https://pokeapi.co/api/data/v2/pokemon/${id}`).catch(()=>null);
            // 簡化示範，若 API 失敗則用預設
            const types = ["火", "飛行"]; 
            document.getElementById('enemyName').innerText = "CHARIZARD";
            document.getElementById('enemyImg').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
            document.getElementById('enemyTypes').innerHTML = types.map(t => `<span class="px-2 border border-blue-400 text-[10px] rounded">${t}</span>`).join('');
            
            document.querySelectorAll('td').forEach(el => el.classList.remove('highlight-col'));
            types.forEach(t => document.querySelectorAll(`.cell-${t}`).forEach(el => el.classList.add('highlight-col')));
            calculateAdvantage(types);
        }

        async function calculateAdvantage(enemyTypes) {
            const pokes = await db.myPokemon.toArray();
            const results = pokes.map(p => {
                let best = 1;
                p.types.forEach(myT => {
                    let m = 1; enemyTypes.forEach(enT => m *= (TYPE_CHART[myT][enT] || 1));
                    if (m > best) best = m;
                });
                return { ...p, score: best };
            }).sort((a, b) => b.score - a.score);

            document.getElementById('recommendationList').innerHTML = results.map(p => `
                <div class="bg-blue-900/20 p-3 rounded-xl border border-blue-500/30 flex justify-between items-center">
                    <div class="text-xs font-bold text-white">${p.name}</div>
                    <div class="text-lg font-black ${p.score >= 2 ? 'text-green-400' : 'text-blue-500'}">${p.score}x</div>
                </div>`).join('');
        }

        // --- 核心修復：口袋按鈕邏輯 ---
        function togglePocket() {
            const m = document.getElementById('pocketModal');
            const isHidden = m.classList.contains('hidden');
            if (isHidden) {
                m.classList.remove('hidden');
                renderPocket(); // 打開時立即渲染
            } else {
                m.classList.add('hidden');
            }
        }

        async function renderPocket() {
            const pokes = await db.myPokemon.toArray();
            const list = document.getElementById('pocketList');
            if (pokes.length === 0) {
                list.innerHTML = `<p class="text-blue-500/50 italic text-center">NO_DATA</p>`;
                return;
            }
            list.innerHTML = pokes.map(p => `
                <div onclick="showDetail(${p.id})" class="p-3 bg-blue-900/20 rounded-xl border border-blue-500/20 cursor-pointer hover:bg-blue-500/40">
                    <div class="text-sm font-bold text-white">${p.name}</div>
                </div>`).join('');
        }

        async function showDetail(id) {
            const p = await db.myPokemon.get(id);
            document.getElementById('pocketDetail').innerHTML = `
                <div class="flex gap-8 animate-pulse-slow">
                    <div class="w-1/2 text-center">
                        <img src="https://via.placeholder.com/200?text=${p.name}" class="w-64 h-64 object-contain mx-auto neon-border rounded-full">
                        <h2 class="text-4xl font-black text-white italic mt-4 underline">${p.name}</h2>
                    </div>
                    <div class="w-1/2 space-y-4">
                        ${renderBar('HP', p.hp)} ${renderBar('ATK', p.atk)} ${renderBar('DEF', p.def)}
                        ${renderBar('SPD', p.speed)}
                    </div>
                </div>`;
        }

        function renderBar(l, v) {
            return `<div class="text-[10px] mb-2"><div class="flex justify-between mb-1"><span>${l}</span><span>${v}</span></div>
            <div class="h-1.5 bg-blue-900/50 rounded-full overflow-hidden border border-blue-500/30"><div class="h-full stat-bar-fill" style="width:${(v/150)*100}%"></div></div></div>`;
        }

        function toggleManual() { document.getElementById('manualModal').classList.toggle('hidden'); }

        // 啟動流程
        (async () => {
            initMatrix();
            await initTestData(); // 先載入數據
            spawnRandomEnemy();   // 初始掃描
        })();
    </script>
</body>
</html>
