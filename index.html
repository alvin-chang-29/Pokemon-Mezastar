<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pokémon Battle Planner v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        .type-btn { @apply px-3 py-1 rounded text-white text-xs font-bold m-0.5 shadow-sm; }
        .一般 { background: #A8A77A; } .火 { background: #EE8130; } .水 { background: #6390F0; }
        .草 { background: #7AC44C; } .電 { background: #F7D02C; } .冰 { background: #96D9D6; }
        .格鬥 { background: #C22E28; } .毒 { background: #A33EA1; } .地面 { background: #E2BF65; }
        .飛行 { background: #A98FF3; } .超能力 { background: #F95587; } .蟲 { background: #A8B820; }
        .岩石 { background: #B6A136; } .幽靈 { background: #735797; } .龍 { background: #6F35FC; }
        .鋼 { background: #B7B7CE; } .惡 { background: #705746; } .妖精 { background: #D685AD; }
        input[type="number"] { width: 60px; border: 1px solid #ddd; border-radius: 4px; padding: 2px 5px; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-blue-700 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-black tracking-tighter">BATTLE PLANNER <span class="text-xs font-normal">v2 (Excel/Manual)</span></h1>
        <div class="flex gap-2">
            <button onclick="document.getElementById('csvInput').click()" class="bg-blue-900 px-4 py-1 rounded-full text-sm">匯入 Excel/CSV</button>
            <button onclick="showManualForm()" class="bg-green-600 px-4 py-1 rounded-full text-sm">手動新增</button>
            <input type="file" id="csvInput" hidden accept=".csv,.txt">
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section class="w-1/3 p-4 flex flex-col border-r bg-white shadow-inner">
            <div class="bg-slate-50 rounded-3xl p-6 border-4 border-slate-200 flex-1 flex flex-col items-center justify-center relative">
                <img id="enemyImg" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-48 h-48 object-contain">
                <h2 id="enemyName" class="text-3xl font-black mt-4 text-slate-800">皮卡丘</h2>
                <div id="enemyTypes" class="flex gap-2 mt-2"></div>
            </div>
            <button onclick="spawnRandomEnemy()" class="mt-4 bg-red-500 text-white py-4 rounded-2xl font-black text-xl active:bg-red-700 shadow-lg">尋找隨機對手</button>
        </section>

        <section class="w-1/3 p-4 flex flex-col bg-slate-50 overflow-hidden">
            <h3 class="font-bold text-slate-600 mb-2 uppercase text-center tracking-widest">Type Effectiveness</h3>
            <div class="flex-1 bg-white rounded-xl shadow-inner border border-slate-200 overflow-auto" id="matrix">
                </div>
        </section>

        <section class="w-1/3 p-4 flex flex-col border-l bg-white">
            <h3 class="font-bold text-slate-600 mb-2">我方戰力清單 (按優勢排序)</h3>
            <div id="myList" class="flex-1 overflow-y-auto space-y-3 pr-2">
                </div>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-bold mb-4">手動編輯寶可夢</h2>
            <div class="space-y-3 text-sm">
                <div class="flex items-center gap-2"><label class="w-20">名稱:</label><input id="f-name" class="flex-1 border p-1 rounded"></div>
                <div class="flex items-center gap-2"><label class="w-20">屬性(逗號隔開):</label><input id="f-types" class="flex-1 border p-1 rounded" placeholder="例如: 火,飛行"></div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="flex items-center gap-2"><label class="w-12">HP:</label><input type="number" id="f-hp"></div>
                    <div class="flex items-center gap-2"><label class="w-12">攻擊:</label><input type="number" id="f-atk"></div>
                </div>
                <div class="text-center mt-4">
                    <button onclick="saveManualPoke()" class="bg-blue-600 text-white px-6 py-2 rounded-full">儲存卡片</button>
                    <button onclick="closeModal()" class="ml-2 text-gray-500 underline">取消</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="imgPicker" hidden accept="image/*">

    <script>
        const TYPE_DATA = { /* 略，同前完整 18 屬性 JSON */ };

        const db = new Dexie("PokeBattleDB_v2");
        db.version(1).stores({ myPokemon: '++id, name, types, hp, atk, customImg' });

        let myTeam = [];
        let currentEnemy = null;
        let editingId = null;

        // --- 初始化屬性矩陣 ---
        function initMatrix() {
            const types = Object.keys(TYPE_DATA);
            let html = `<table class="min-w-full text-center border-collapse"><thead><tr><th class="p-1"></th>`;
            types.forEach(t => html += `<th class="p-1 text-[9px] font-bold">${t.slice(0,1)}</th>`);
            html += `</tr></thead><tbody>`;
            types.forEach(row => {
                html += `<tr><td class="text-[9px] font-bold p-1 border bg-gray-50">${row.slice(0,1)}</td>`;
                types.forEach(col => {
                    const val = TYPE_DATA[row][col] || 1;
                    const char = val === 2 ? '●' : val === 0.5 ? '▲' : val === 0 ? '×' : '';
                    const color = val === 2 ? 'text-red-500' : 'text-blue-400';
                    html += `<td class="border p-1 text-xs ${color}">${char}</td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('matrix').innerHTML = html;
        }

        // --- 隨機對手 ---
        async function spawnRandomEnemy() {
            const id = Math.floor(Math.random() * 151) + 1;
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const data = await res.json();
            currentEnemy = {
                name: data.name.toUpperCase(),
                types: data.types.map(t => translateType(t.type.name)),
                img: data.sprites.other["official-artwork"].front_default
            };
            document.getElementById('enemyName').innerText = currentEnemy.name;
            document.getElementById('enemyImg').src = currentEnemy.img;
            document.getElementById('enemyTypes').innerHTML = currentEnemy.types.map(t => `<span class="type-btn ${t}">${t}</span>`).join('');
            calculateStrategy();
        }

        function translateType(en) {
            const map = {"fire":"火","water":"水","grass":"草","electric":"電","ice":"冰","fighting":"格鬥","poison":"毒","ground":"地面","flying":"飛行","psychic":"超能力","bug":"蟲","rock":"岩石","ghost":"幽靈","dragon":"龍","dark":"惡","steel":"鋼","fairy":"妖精","normal":"一般"};
            return map[en] || "一般";
        }

        // --- Excel / CSV 匯入邏輯 ---
        document.getElementById('csvInput').onchange = async (e) => {
            const file = e.target.files[0];
            const text = await file.text();
            const rows = text.split(/\r?\n/);
            
            for (let i = 1; i < rows.length; i++) { // 跳過標題列
                const cols = rows[i].split(/[,，\t]/); // 支援逗號或 Tab
                if (cols.length >= 3) {
                    await db.myPokemon.add({
                        name: cols[1].trim(),
                        types: cols[3].split('/').map(s => s.trim()),
                        hp: parseInt(cols[4]) || 100,
                        atk: 100
                    });
                }
            }
            loadTeam();
        };

        // --- 手動輸入邏輯 ---
        function showManualForm() { editingId = null; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        async function saveManualPoke() {
            const poke = {
                name: document.getElementById('f-name').value,
                types: document.getElementById('f-types').value.split(/[，,]/).map(s => s.trim()),
                hp: parseInt(document.getElementById('f-hp').value),
                atk: parseInt(document.getElementById('f-atk').value)
            };
            await db.myPokemon.add(poke);
            closeModal();
            loadTeam();
        }

        // --- 核心演算：對戰計畫 ---
        function calculateStrategy() {
            if (!currentEnemy || myTeam.length === 0) return;
            myTeam = myTeam.map(p => {
                let maxMul = 0;
                p.types.forEach(myT => {
                    let m = 1;
                    currentEnemy.types.forEach(enT => m *= (TYPE_DATA[myT]?.[enT] || 1));
                    if (m > maxMul) maxMul = m;
                });
                return { ...p, score: maxMul };
            }).sort((a, b) => b.score - a.score);
            renderMyTeam();
        }

        function renderMyTeam() {
            const list = document.getElementById('myList');
            list.innerHTML = myTeam.map(p => `
                <div class="flex items-center gap-3 p-3 bg-white border rounded-2xl shadow-sm ${p.score >= 2 ? 'ring-2 ring-green-400' : ''}">
                    <img src="${p.customImg || 'https://via.placeholder.com/60?text=IMAGE'}" 
                         class="w-12 h-12 rounded-lg object-cover cursor-pointer" onclick="pickImage(${p.id})">
                    <div class="flex-1">
                        <div class="flex justify-between font-bold text-gray-800">
                            <span>${p.name}</span>
                            <span class="${p.score >= 2 ? 'text-green-600' : 'text-gray-400'}">${p.score || 1}x</span>
                        </div>
                        <div class="flex gap-1 mt-1">${p.types.map(t => `<span class="text-[8px] type-btn ${t}">${t}</span>`).join('')}</div>
                    </div>
                </div>
            `).join('');
        }

        // 圖片處理與載入同前...
        async function loadTeam() { myTeam = await db.myPokemon.toArray(); calculateStrategy(); }
        initMatrix();
        loadTeam();
        spawnRandomEnemy();
    </script>
</body>
</html>
