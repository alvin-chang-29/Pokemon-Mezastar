<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢對戰舞台 - 模組測試 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 震動動畫 */
        @keyframes pokemon-shake {
            0% { transform: translate(0,0) rotate(0deg); }
            20% { transform: translate(-3px, 1px) rotate(-1deg); }
            40% { transform: translate(-3px, -1px) rotate(1deg); }
            60% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(3px, -1px) rotate(1deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }
        
        .is-battling {
            animation: pokemon-shake 0.2s infinite;
        }

        .is-critical { /* 40秒後加強震動 */
            animation: pokemon-shake 0.1s infinite;
            filter: drop-shadow(0 0 10px red);
        }

        /* 逃跑動畫：向右慢慢移動並搖晃 */
        .escape-animation {
            transition: transform 3s ease-in, opacity 2s;
            transform: translateX(100vw) rotate(15deg) !important;
            opacity: 0;
        }

        /* 閃爍效果 */
        .is-flashing {
            animation: pulse-light 0.5s ease-in-out infinite alternate;
        }
        @keyframes pulse-light {
            from { opacity: 1; filter: brightness(1); }
            to { opacity: 0.7; filter: brightness(1.5); }
        }

        .battle-bg {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            min-height: 400px;
        }
    </style>
</head>
<body class="bg-gray-900 text-white p-4">

    <div class="max-w-6xl mx-auto mb-4 flex justify-between items-center bg-black p-4 rounded-lg border-2 border-red-600">
        <div class="text-xl font-bold">戰鬥狀態: <span id="status-text" class="text-green-400">準備中</span></div>
        <div class="text-3xl font-mono text-yellow-400">TIME: <span id="timer">00</span>s</div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 battle-bg p-8 rounded-3xl border-4 border-gray-700 relative overflow-hidden">
        
        <div class="flex flex-col items-center justify-center space-y-4">
            <div class="bg-red-900/30 p-2 rounded-lg text-red-400 font-bold border border-red-500">ENEMY</div>
            <div id="enemy-pokemon" class="w-48 h-48 bg-contain bg-no-repeat bg-center transition-all duration-500" 
                 style="background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png');">
            </div>
            <div class="w-full bg-gray-700 h-4 rounded-full overflow-hidden">
                <div id="enemy-hp" class="bg-green-500 h-full w-full transition-all duration-500"></div>
            </div>
        </div>

        <div class="flex items-center justify-center border-x border-gray-700 px-4">
            <div id="math-zone" class="text-center">
                <p class="text-gray-400 mb-4">-- 乘法對戰區 --</p>
                <div class="text-6xl font-black text-white mb-8">9 × 9 = ?</div>
                <button onclick="startBattle()" id="start-btn" class="bg-red-600 hover:bg-red-700 text-white px-10 py-4 rounded-full text-2xl font-bold shadow-lg transform active:scale-95 transition">
                    開始戰鬥！
                </button>
            </div>
        </div>

        <div class="flex flex-col items-center justify-center space-y-4">
            <div class="bg-blue-900/30 p-2 rounded-lg text-blue-400 font-bold border border-blue-500">PLAYER</div>
            <div id="player-pokemon" class="w-48 h-48 bg-contain bg-no-repeat bg-center" 
                 style="background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png'); transform: scaleX(-1);">
            </div>
            <div class="w-full bg-gray-700 h-4 rounded-full">
                <div class="bg-blue-500 h-full w-full"></div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto mt-8 flex gap-4 justify-center">
        <button onclick="simulateKO()" class="bg-yellow-500 text-black px-4 py-2 rounded">模擬 KO (進入收服)</button>
    </div>

    <script>
        let time = 0;
        let timerInterval;

        function startBattle() {
            // 初始化介面
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('status-text').innerText = "戰鬥中！";
            document.getElementById('status-text').className = "text-red-500";
            
            // 啟動閃爍與震動
            document.getElementById('enemy-pokemon').classList.add('is-battling', 'is-flashing');
            document.getElementById('player-pokemon').classList.add('is-battling', 'is-flashing');

            // 啟動計時器
            timerInterval = setInterval(() => {
                time++;
                document.getElementById('timer').innerText = time < 10 ? '0'+time : time;

                // 20s KO 門檻 (手冊邏輯)
                if (time === 20) {
                    document.getElementById('status-text').innerText = "快！HP 減半門檻！";
                }

                // 40s HP 減半門檻 (加強震動)
                if (time === 40) {
                    document.getElementById('enemy-hp').style.width = "50%";
                    document.getElementById('enemy-pokemon').classList.add('is-critical');
                    document.getElementById('status-text').innerText = "警告：即將逃跑！";
                }

                // 60s 逃跑限制
                if (time >= 60) {
                    triggerEscape();
                }
            }, 1000);
        }

        function triggerEscape() {
            clearInterval(timerInterval);
            document.getElementById('status-text').innerText = "寶可夢逃走了...";
            document.getElementById('enemy-pokemon').classList.remove('is-battling', 'is-flashing', 'is-critical');
            document.getElementById('enemy-pokemon').classList.add('escape-animation');
            // 移除我方震動
            document.getElementById('player-pokemon').classList.remove('is-battling', 'is-flashing');
        }

        function simulateKO() {
            clearInterval(timerInterval);
            alert("KO！準備進入收服畫面 (下個模組測試)");
            location.reload();
        }
    </script>
</body>
</html>
