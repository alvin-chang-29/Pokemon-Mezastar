<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Poké-System Strategist v4.0 Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@400;900&display=swap');
        body { background: radial-gradient(circle at center, #0a192f 0%, #020617 100%); font-family: 'Orbitron', 'Noto Sans TC', sans-serif; color: #60a5fa; }
        .neon-border { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5), inset 0 0 10px rgba(59, 130, 246, 0.2); }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.3); }
        .stat-bar-bg { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); }
        .stat-bar-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); box-shadow: 0 0 10px #3b82f6; transition: width 0.5s ease-out; }
        #matrix table { font-size: 10px; border-collapse: collapse; width: 100%; color: #94a3b8; }
        #matrix td, #matrix th { border: 1px solid rgba(59, 130, 246, 0.2); text-align: center; padding: 4px 0; }
        .highlight-col { background-color: rgba(59, 130, 246, 0.3) !important; color: white; }
        .type-tag { @apply px-2 py-0.5 rounded text-[10px] font-bold border border-blue-400 text-blue-400; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="p-4 glass-panel flex justify-between items-center border-b border-blue-500/50">
        <h1 class="text-2xl font-black italic tracking-tighter text-white">STRATEGY_CORE <span class="text-blue-500">v4.0</span></h1>
        <div class="flex gap-4">
            <button onclick="togglePocket()" class="neon-border px-6 py-2 rounded-full bg-blue-900/40 text-sm font-bold hover:bg-blue-600">🎒 POKÉ_POCKET</button>
            <button onclick="document.getElementById('csvInput').click()" class="bg-blue-600/20 px-4 py-2 rounded-lg border border-blue-500 text-xs">IMPORT_CSV</button>
            <input type="file" id="csvInput" hidden accept=".csv,.txt">
        </div>
    </header>

    <main class="flex-1 flex p-4 gap-4 overflow-hidden">
        <section class="w-1/4 flex flex-col gap-4">
            <div class="glass-panel flex-1 rounded-3xl neon-border flex flex-col items-center justify-center p-6 relative">
                <div class="absolute top-0 w-full h-1 bg-blue-400/50 animate-pulse"></div>
                <img id="enemyImg" src="" class="w-48 h-48 object-contain z-10 drop-shadow-[0_0_15px_#3b82f6]">
                <h2 id="enemyName" class="text-2xl font-black mt-6 tracking-widest text-white italic">---</h2>
                <div id="enemyTypes" class="flex gap-2 mt-2"></div>
            </div>
            <button onclick="spawnRandomEnemy()" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg">INITIATE_SCAN</button>
        </section>

        <section class="w-2/4 flex flex-col glass-panel rounded-3xl neon-border p-4">
            <h3 class="text-center text-xs tracking-[0.4em] mb-4 text-blue-400 uppercase">Analysis Matrix System</h3>
            <div class="flex-1 overflow-auto rounded-xl bg-black/40 p-2" id="matrix"></div>
        </section>

        <section class="w-1/4 flex flex-col gap-4">
            <div class="glass-panel rounded-3xl neon-border p-4 flex-1 flex flex-col">
                <h3 class="text-xs font-bold mb-4 tracking-widest text-blue-400 border-l-2 border-blue-500 pl-2 uppercase">Command Advisor</h3>
                <div id="recommendationList" class="flex-1 overflow-y-auto space-y-3"></div>
            </div>
        </section>
    </main>

    <div id="pocketModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-8 z-50">
        <div class="glass-panel rounded-[2.5rem] neon-border w-full max-w-6xl h-[85vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-blue-500/30 flex justify-between items-center bg-blue-900/20">
                <h2 class="text-2xl font-black text-white italic">DATA_ARCHIVE</h2>
                <button onclick="togglePocket()" class="text-4xl text-blue-500 hover:text-white">&times;</button>
            </div>
            <div class="flex-1 flex overflow-hidden">
                <div id="pocketList" class="w-1/3 border-r border-blue-500/20 overflow-y-auto p-4 space-y-3 bg-blue-900/10"></div>
                <div id="pocketDetail" class="w-2/3 p-10 overflow-y-auto bg-black/40 relative">
                    <p class="text-blue-500/30 text-center mt-32 italic">AWAITING_SELECTION</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ALL_TYPES = ["一般","火","水","草","電","冰","格鬥","毒","地面","飛行","超能力","蟲","岩石","幽靈","龍","鋼","惡","妖精"];
        const TYPE_CHART = {
            "一般": {"岩石": 0.5, "幽靈": 0, "鋼": 0.5}, "火": {"火": 0.5, "水": 0.5, "草": 2, "冰": 2, "蟲": 2, "岩石": 0.5, "龍": 0.5, "鋼": 2},
            "水": {"火": 2, "水": 0.5, "草": 0.5, "地面": 2, "岩石": 2, "龍": 0.5}, "草": {"火": 0.5, "水": 2, "草": 0.5, "毒": 0.5, "地面": 2, "飛行": 0.5, "蟲": 0.5, "岩石": 2, "龍": 0.5, "鋼": 0.5},
            "電": {"水": 2, "草": 0.5, "電": 0.5, "地面": 0, "飛行": 2, "龍": 0.5}, "冰": {"火": 0.5, "水": 0.5, "草": 2, "冰": 0.5, "地面": 2, "飛行": 2, "龍": 2, "鋼": 0.5},
            "格鬥": {"一般": 2, "冰": 2, "毒": 0.5, "飛行": 0.5, "超能力": 0.5, "蟲": 0.5, "岩石": 2, "幽靈": 0, "鋼": 2, "妖精": 0.5}, "毒": {"草": 2, "毒": 0.5, "地面": 0.5, "岩石": 0.5, "幽靈": 0.5, "鋼": 0, "妖精": 2},
            "地面": {"火": 2, "草": 0.5, "電": 2, "毒": 2, "蟲": 0.5, "岩石": 2, "鋼": 2}, "飛行": {"草": 2, "電": 0.5, "格鬥": 2, "蟲": 2, "岩石": 0.5, "鋼": 0.5},
            "超能力": {"格鬥": 2, "毒": 2, "超能力": 0.5, "鋼": 0.5, "惡": 0}, "蟲": {"火": 0.5, "草": 2, "格鬥": 0.5, "毒": 0.5, "飛行": 0.5, "超能力": 2, "幽靈": 0.5, "鋼": 0.5, "惡": 2, "妖精": 0.5},
            "岩石": {"火": 2, "冰": 2, "格鬥": 0.5, "地面": 0.5, "飛行": 2, "蟲": 2, "鋼": 0.5}, "幽靈": {"一般": 0, "超能力": 2, "幽靈": 2, "惡": 0.5},
            "龍": {"龍": 2, "鋼": 0.5, "妖精": 0}, "鋼": {"火": 0.5, "水": 0.5, "電": 0.5, "冰": 2, "岩石": 2, "鋼": 0.5, "妖精": 2},
            "惡": {"格鬥": 0.5, "超能力": 2, "幽靈": 2, "惡": 0.5, "妖精": 0.5}, "妖精": {"火": 0.5, "格鬥": 2, "毒": 0.5, "龍": 2, "鋼": 0.5, "惡": 2}
        };

        const db = new Dexie("PokeFutureDB_v4");
        db.version(1).stores({ myPokemon: '++id, name, types, level, hp, atk, def, spAtk, spDef, speed' });

        function initMatrix() {
            let html = `<table><thead><tr><th></th>`;
            ALL_TYPES.forEach(t => html += `<th>${t.slice(0,1)}</th>`);
            html += `</tr></thead><tbody>`;
            ALL_TYPES.forEach(row => {
                html += `<tr><th class="bg-blue-900/20">${row.slice(0,1)}</th>`;
                ALL_TYPES.forEach(col => {
                    const val = TYPE_CHART[row][col] || 1;
                    const char = val === 2 ? '●' : val === 0.5 ? '▲' : val === 0 ? '×' : '';
                    html += `<td class="cell-${col}">${char}</td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('matrix').innerHTML = html + `</tbody></table>`;
        }

        async function spawnRandomEnemy() {
            const id = Math.floor(Math.random() * 1010) + 1;
            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                const data = await res.json();
                const types = data.types.map(t => translateType(t.type.name));
                document.getElementById('enemyName').innerText = data.name.toUpperCase();
                document.getElementById('enemyImg').src = data.sprites.other["official-artwork"].front_default;
                document.getElementById('enemyTypes').innerHTML = types.map(t => `<span class="type-tag">${t}</span>`).join('');
                
                document.querySelectorAll('td').forEach(el => el.classList.remove('highlight-col'));
                types.forEach(t => document.querySelectorAll(`.cell-${t}`).forEach(el => el.classList.add('highlight-col')));
                calculateAdvantage(types);
            } catch (e) { alert("SCANNER ERROR: CHECK CONNECTION"); }
        }

        function translateType(en) {
            const m = {"fire":"火","water":"水","grass":"草","electric":"電","ice":"冰","fighting":"格鬥","poison":"毒","ground":"地面","flying":"飛行","psychic":"超能力","bug":"蟲","rock":"岩石","ghost":"幽靈","dragon":"龍","dark":"惡","steel":"鋼","fairy":"妖精","normal":"一般"};
            return m[en] || "一般";
        }

        async function calculateAdvantage(enemyTypes) {
            const pokes = await db.myPokemon.toArray();
            const results = pokes.map(p => {
                let best = 0;
                p.types.forEach(myT => {
                    let m = 1; enemyTypes.forEach(enT => m *= (TYPE_CHART[myT][enT] || 1));
                    if (m > best) best = m;
                });
                return { ...p, score: best };
            }).sort((a, b) => b.score - a.score);

            document.getElementById('recommendationList').innerHTML = results.map(p => `
                <div class="bg-blue-900/20 p-3 rounded-xl border border-blue-500/30 flex justify-between items-center">
                    <div><div class="text-xs font-bold text-white">${p.name}</div><div class="text-[10px]">${p.types.join('/')}</div></div>
                    <div class="text-lg font-black ${p.score >= 2 ? 'text-green-400' : 'text-blue-500'}">${p.score}x</div>
                </div>`).join('');
        }

        function togglePocket() { 
            const m = document.getElementById('pocketModal');
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) renderPocket();
        }

        async function renderPocket() {
            const pokes = await db.myPokemon.toArray();
            document.getElementById('pocketList').innerHTML = pokes.map(p => `
                <div onclick="showDetail(${p.id})" class="p-3 bg-blue-900/20 rounded-xl border border-blue-500/20 cursor-pointer hover:bg-blue-600/30">
                    <div class="text-sm font-bold text-white">${p.name}</div>
                    <div class="text-[10px] text-blue-400">#${String(p.id).padStart(4,'0')}</div>
                </div>`).join('');
        }

        async function showDetail(id) {
            const p = await db.myPokemon.get(id);
            document.getElementById('pocketDetail').innerHTML = `
                <div class="flex gap-8"><div class="w-1/2">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id % 1000}.png" class="w-64 h-64 object-contain mx-auto">
                    <h2 class="text-4xl font-black text-white italic mt-4 text-center">${p.name}</h2>
                </div><div class="w-1/2 space-y-4">
                    ${renderBar('HP', p.hp)} ${renderBar('ATK', p.atk)} ${renderBar('DEF', p.def)}
                    ${renderBar('SP_ATK', p.spAtk)} ${renderBar('SP_DEF', p.spDef)} ${renderBar('SPD', p.speed)}
                </div></div>`;
        }

        function renderBar(l, v) {
            return `<div class="text-[10px]"><div class="flex justify-between mb-1"><span>${l}</span><span>${v}</span></div>
            <div class="h-1.5 stat-bar-bg rounded-full overflow-hidden"><div class="h-full stat-bar-fill" style="width:${(v/255)*100}%"></div></div></div>`;
        }

        document.getElementById('csvInput').onchange = async (e) => {
            const f = e.target.files[0]; const t = await f.text();
            const r = t.split('\n').filter(l => l.trim());
            for(let i=1; i<r.length; i++) {
                const c = r[i].split(/[,，\t]/);
                if(c.length < 3) continue;
                await db.myPokemon.add({ name: c[1], types: c[3].split('/').map(x=>x.trim()), hp: c[5]||100, atk: c[6]||100, def: c[7]||100, spAtk: c[8]||100, spDef: c[9]||100, speed: c[10]||100 });
            }
            renderPocket();
        }

        initMatrix();
        spawnRandomEnemy();
    </script>
</body>
</html>
