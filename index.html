<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>隊伍挑選與背包系統 v8.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .slot { border: 4px dashed #475569; transition: all 0.3s; }
        .slot-filled { border: 4px solid #eab308; background: rgba(234, 179, 8, 0.1); }
        .poke-card { cursor: pointer; transition: transform 0.2s; }
        .poke-card:active { scale: 0.95; }
        .is-recommended { ring: 4px; ring-color: #ef4444; position: relative; }
        .is-recommended::after { content: "推薦"; position: absolute; top: -10px; right: -10px; background: #ef4444; color: white; padding: 2px 8px; border-radius: 999px; font-size: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-white p-6">

    <div class="max-w-4xl mx-auto">
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-700 mb-8 flex items-center justify-between">
            <div>
                <h3 class="text-slate-400 text-sm">目前的強敵</h3>
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-contain bg-center bg-no-repeat" style="background-image:url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png')"></div>
                    <span class="text-3xl font-black">超夢 <span class="text-sm text-purple-400 font-normal">(超能力)</span></span>
                </div>
                <p class="text-xs text-red-400 mt-2">💡 建議使用：蟲、幽靈、惡 屬性</p>
            </div>
            <div class="text-right">
                <button class="bg-slate-800 px-4 py-2 rounded-lg text-xs border border-slate-600">查看屬性表</button>
            </div>
        </div>

        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="bg-yellow-500 w-2 h-6 block"></span> 選擇出戰隊伍 (3隻)
        </h2>
        <div class="grid grid-cols-3 gap-4 mb-10">
            <div id="slot-0" class="slot h-40 rounded-2xl flex items-center justify-center flex-col text-slate-500">
                <span class="text-4xl">+</span>
            </div>
            <div id="slot-1" class="slot h-40 rounded-2xl flex items-center justify-center flex-col text-slate-500">
                <span class="text-4xl">+</span>
            </div>
            <div id="slot-2" class="slot h-40 rounded-2xl flex items-center justify-center flex-col text-slate-500">
                <span class="text-4xl">+</span>
            </div>
        </div>

        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="bg-blue-500 w-2 h-6 block"></span> 我的背包 (點擊加入)
        </h2>
        <div id="backpack" class="grid grid-cols-4 md:grid-cols-6 gap-3">
            </div>

        <button id="start-battle" class="w-full mt-10 bg-red-600 py-4 rounded-full font-black text-2xl opacity-50 cursor-not-allowed">
            進入戰鬥！
        </button>
    </div>

    <script>
        // 模擬從 Dexie.js 讀取的背包資料
        const myPokemon = [
            { id: 25, name: "皮卡丘", type: "電" },
            { id: 1, name: "妙蛙種子", type: "草" },
            { id: 4, name: "小火龍", type: "炎" },
            { id: 94, name: "耿鬼", type: "幽靈", recommended: true },
            { id: 133, name: "伊布", type: "一般" }
        ];

        let selectedTeam = [null, null, null];

        function initBackpack() {
            const container = document.getElementById('backpack');
            myPokemon.forEach(p => {
                const card = document.createElement('div');
                card.className = `poke-card bg-slate-800 p-2 rounded-xl border border-slate-700 flex flex-col items-center ${p.recommended ? 'is-recommended' : ''}`;
                card.innerHTML = `
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" class="w-16 h-16">
                    <span class="text-xs mt-1">${p.name}</span>
                `;
                card.onclick = () => addToTeam(p);
                container.appendChild(card);
            });
        }

        function addToTeam(p) {
            const emptySlotIndex = selectedTeam.indexOf(null);
            if (emptySlotIndex !== -1) {
                selectedTeam[emptySlotIndex] = p;
                updateSlots();
            } else {
                alert("隊伍已滿！點擊插槽可以更換。");
            }
        }

        function updateSlots() {
            selectedTeam.forEach((p, i) => {
                const slot = document.getElementById(`slot-${i}`);
                if (p) {
                    slot.className = "slot slot-filled h-40 rounded-2xl flex items-center justify-center flex-col cursor-pointer";
                    slot.innerHTML = `
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" class="w-24 h-24">
                        <span class="text-xs font-bold text-yellow-400">${p.name}</span>
                    `;
                    slot.onclick = () => { selectedTeam[i] = null; updateSlots(); };
                } else {
                    slot.className = "slot h-40 rounded-2xl flex items-center justify-center flex-col text-slate-500";
                    slot.innerHTML = `<span class="text-4xl">+</span>`;
                    slot.onclick = null;
                }
            });

            // 檢查是否可以開始戰鬥
            const btn = document.getElementById('start-battle');
            if (selectedTeam.every(p => p !== null)) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.onclick = () => alert("即將帶著隊伍進入對戰舞台！");
            } else {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.onclick = null;
            }
        }

        initBackpack();
    </script>
</body>
</html>
