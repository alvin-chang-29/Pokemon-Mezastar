<style>
    /* 修正後的容器佈局 */
    .battle-center-container {
        position: relative;
        width: 100%;
        max-width: 500px; /* 限制桌機最大寬度避免過大跑位 */
        aspect-ratio: 1 / 1; /* 保持正方形比例 */
    }

    #grid {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        grid-template-rows: repeat(10, 1fr);
        gap: 4px;
        width: 100%;
        height: 100%;
    }

    /* 方塊容器：覆蓋在 Grid 正上方 */
    #block-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        grid-template-rows: repeat(10, 1fr);
        gap: 4px;
        pointer-events: none; /* 確保滑鼠可以點擊到底下的數字 */
        z-index: 20;
    }

    /* 紅色答案目標格：確保在最上層 */
    .flash-red-target {
        z-index: 50 !important;
        position: relative;
        animation: pulse-red 0.5s infinite alternate !important;
        background-color: #ef4444 !important;
        color: white !important;
        opacity: 1 !important;
        border: 4px solid white !important;
    }

    .block-unit {
        width: 80%;
        height: 80%;
        margin: auto;
        border-radius: 4px;
        transform: scale(0);
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    /* ... 保持原本的動畫設定 ... */
</style>

<div class="battle-center-container">
    <div id="grid"></div>
    <div id="block-layer"></div>
</div>

<script>
    // 修正後的方塊生成邏輯：利用 CSS Grid 坐標
    function createBlock(r, c, cls) {
        const bContainer = document.createElement('div');
        // 使用 CSS Grid 的 grid-area 直接定位，保證無論縮放都不會跑掉
        bContainer.style.gridRow = r + 1; // +1 因為 Grid index 從 1 開始
        bContainer.style.gridColumn = c + 1;
        
        const b = document.createElement('div');
        b.className = `block-unit ${cls}`;
        bContainer.appendChild(b);
        
        document.getElementById('block-layer').appendChild(bContainer);
        setTimeout(() => b.classList.add('block-show'), 50);
    }

    function clickB(c) {
        if (step === 1 && c === b) {
            step = 2;
            showBlocks('g');
            // 修正：找到目標格並強制提升層級
            const target = document.getElementById(`c-${a}-${b}`);
            target.classList.add('flash-red-target');
            target.style.textShadow = "0 0 5px black";
        }
    }
</script>
