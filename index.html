<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢對戰計畫 PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        .type-tag { padding: 2px 8px; border-radius: 4px; color: white; font-size: 0.8rem; margin: 2px; }
        .電 { background: #F7D02C; } .火 { background: #EE8130; } .水 { background: #6390F0; }
        .草 { background: #7AC74C; } .一般 { background: #A8A77A; } .格鬥 { background: #C22E28; }
        .飛行 { background: #A98FF3; } .毒 { background: #A33EA1; } .地面 { background: #E2BF65; }
        .岩石 { background: #B6A136; } .蟲 { background: #A8B820; } .幽靈 { background: #735797; }
        .鋼 { background: #B7B7CE; } .冰 { background: #96D9D6; } .龍 { background: #6F35FC; }
        .惡 { background: #705746; } .超能力 { background: #F95587; } .妖精 { background: #D685AD; }
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden flex flex-col">

    <header class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold">寶可夢對戰助手</h1>
        <div class="space-x-2">
            <input type="file" id="importFile" class="hidden" accept=".txt,.docx">
            <button onclick="document.getElementById('importFile').click()" class="bg-blue-800 px-3 py-1 rounded">載入卡片 (Txt/Word)</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section class="w-1/3 p-4 border-r bg-white flex flex-col">
            <h2 class="text-lg font-bold mb-2">對手</h2>
            <div id="enemy-area" class="flex-1 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center p-4">
                <img id="enemy-img" src="https://via.placeholder.com/150?text=Wait" class="w-40 h-40 object-contain mb-4">
                <div id="enemy-info" class="text-center">
                    <p class="text-xl font-bold" id="e-name">點擊隨機開始</p>
                    <div id="e-types" class="flex justify-center mt-1"></div>
                </div>
            </div>
            <button onclick="spawnEnemy()" class="mt-4 bg-red-500 text-white py-3 rounded-xl font-bold active:bg-red-700">隨機遭遇對手！</button>
        </section>

        <section class="w-1/3 p-4 flex flex-col">
            <h2 class="text-lg font-bold mb-2">對戰計畫表</h2>
            <div class="flex-1 bg-white rounded shadow p-2 overflow-auto text-xs" id="matrix-container">
                
            </div>
            <button onclick="analyzeBattle()" class="mt-4 bg-orange-500 text-white py-3 rounded-xl font-bold">按此啟動對戰分析</button>
        </section>

        <section class="w-1/3 p-4 bg-slate-50 flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-bold">建議派出</h2>
                <button onclick="triggerImgUpload()" class="text-xs text-blue-500">更換我方圖片</button>
                <input type="file" id="customImg" class="hidden" accept="image/*">
            </div>
            <div id="my-pokemon-list" class="flex-1 space-y-3 overflow-y-auto">
                <p class="text-gray-400 text-center mt-10">尚無卡片，請先載入</p>
            </div>
        </section>
    </main>

    <script>
        // --- 核心數據 ---
        const TYPE_CHART = {
            "火": {"草": 2, "冰": 2, "蟲": 2, "鋼": 2, "水": 0.5, "火": 0.5, "岩石": 0.5, "龍": 0.5},
            "水": {"火": 2, "地面": 2, "岩石": 2, "水": 0.5, "草": 0.5, "龍": 0.5},
            "電": {"水": 2, "飛行": 2, "電": 0.5, "草": 0.5, "地面": 0},
            "草": {"水": 2, "地面": 2, "岩石": 2, "火": 0.5, "草": 0.5, "毒": 0.5, "飛行": 0.5, "蟲": 0.5, "鋼": 0.5, "龍": 0.5},
            // ... 其餘屬性簡化演示，實際運算會帶入完整表
        };
        const ALL_TYPES = ["一般","火","水","草","電","冰","格鬥","毒","地面","飛行","超能力","蟲","岩石","幽靈","龍","鋼","惡","妖精"];

        let myPokemons = [];
        let currentEnemy = null;

        // --- 功能：隨機對手 ---
        function spawnEnemy() {
            const names = ["小火龍", "傑尼龜", "妙蛙種子", "皮卡丘"];
            const types = [["火"], ["水"], ["草", "毒"], ["電"]];
            const idx = Math.floor(Math.random() * names.length);
            
            currentEnemy = {
                name: names[idx],
                types: types[idx],
                img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${idx+1}.png`
            };

            document.getElementById('e-name').innerText = currentEnemy.name;
            document.getElementById('enemy-img').src = currentEnemy.img;
            const typeContainer = document.getElementById('e-types');
            typeContainer.innerHTML = '';
            currentEnemy.types.forEach(t => {
                typeContainer.innerHTML += `<span class="type-tag ${t}">${t}</span>`;
            });
        }

        // --- 功能：文件載入 ---
        document.getElementById('importFile').onchange = async (e) => {
            const file = e.target.files[0];
            const text = await file.text(); // 簡化演示用 TXT 解析
            
            // 範例解析邏輯
            const name = text.match(/名稱[:：]\s*(\S+)/)?.[1] || "自製寶可夢";
            const types = text.match(/屬性[:：]\s*(\S+)/)?.[1].split(',') || ["一般"];
            
            const newPoke = { id: Date.now(), name, types, customImg: null };
            myPokemons.push(newPoke);
            renderMyList();
            alert("成功載入：" + name);
        };

        // --- 功能：圖片上傳替代 ---
        function triggerImgUpload() { document.getElementById('customImg').click(); }
        document.getElementById('customImg').onchange = (e) => {
            if (myPokemons.length === 0) return alert("請先載入至少一張卡片");
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                myPokemons[0].customImg = event.target.result; // 暫時替換第一張
                renderMyList();
            };
            reader.readAsDataURL(file);
        };

        // --- 功能：對戰分析 ---
        function analyzeBattle() {
            if (!currentEnemy) return alert("請先按左側隨機召喚對手！");
            
            myPokemons.forEach(p => {
                let score = 1;
                p.types.forEach(myT => {
                    currentEnemy.types.forEach(enT => {
                        score *= (TYPE_CHART[myT]?.[enT] || 1);
                    });
                });
                p.lastScore = score;
            });

            myPokemons.sort((a, b) => b.lastScore - a.lastScore);
            renderMyList();
        }

        function renderMyList() {
            const list = document.getElementById('my-pokemon-list');
            list.innerHTML = '';
            myPokemons.forEach(p => {
                list.innerHTML += `
                    <div class="bg-white p-3 rounded shadow flex items-center border-l-4 ${p.lastScore > 1 ? 'border-green-500' : 'border-gray-300'}">
                        <img src="${p.customImg || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded mr-3">
                        <div class="flex-1">
                            <p class="font-bold">${p.name}</p>
                            <p class="text-xs text-gray-500">${p.types.join('/')}</p>
                        </div>
                        <div class="text-orange-600 font-bold">${p.lastScore ? p.lastScore + 'x' : '-'}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
