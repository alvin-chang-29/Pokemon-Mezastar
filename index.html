<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
    <title>隊伍挑選與背包系統 v8.4</title>
    <title>寶可夢進化背包系統 - 模組測試 v8.5</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
        .slot { border: 4px dashed #475569; transition: all 0.3s; }
        .slot-filled { border: 4px solid #eab308; background: rgba(234, 179, 8, 0.1); }
        .poke-card { cursor: pointer; transition: transform 0.2s; }
        .poke-card:active { scale: 0.95; }
        .is-recommended { ring: 4px; ring-color: #ef4444; position: relative; }
        .is-recommended::after { content: "推薦"; position: absolute; top: -10px; right: -10px; background: #ef4444; color: white; padding: 2px 8px; border-radius: 999px; font-size: 10px; }
        .evo-path-line { height: 2px; flex-grow: 1; background: #475569; margin: 0 10px; position: relative; top: 20px; }
        .locked { filter: brightness(0) invert(0.3); } /* 剪影效果 */
        .exp-bar { height: 8px; background: #1e293b; border-radius: 999px; overflow: hidden; border: 1px solid #334155; }
        .exp-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 0.5s ease-out; }
</style>
</head>
<body class="bg-slate-950 text-white p-6">
<body class="bg-slate-950 text-white p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-700 mb-8 flex items-center justify-between">
            <div>
                <h3 class="text-slate-400 text-sm">目前的強敵</h3>
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-contain bg-center bg-no-repeat" style="background-image:url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png')"></div>
                    <span class="text-3xl font-black">超夢 <span class="text-sm text-purple-400 font-normal">(超能力)</span></span>
                </div>
                <p class="text-xs text-red-400 mt-2">💡 建議使用：蟲、幽靈、惡 屬性</p>
            </div>
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h1 class="text-3xl font-black text-yellow-500 tracking-widest">我的寶可夢背包</h1>
<div class="text-right">
                <button class="bg-slate-800 px-4 py-2 rounded-lg text-xs border border-slate-600">查看屬性表</button>
                <p class="text-xs text-slate-400">進化難易度設定：<span class="text-green-400">普通 (1.0x)</span></p>
                <p class="text-xs text-slate-400">總答對題數：<span id="total-correct">0</span></p>
</div>
        </div>
        </header>

        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="bg-yellow-500 w-2 h-6 block"></span> 選擇出戰隊伍 (3隻)
        </h2>
        <div class="grid grid-cols-3 gap-4 mb-10">
            <div id="slot-0" class="slot h-40 rounded-2xl flex items-center justify-center flex-col text-slate-500">
                <span class="text-4xl">+</span>
            </div>
            <div id="slot-1" class="slot h-40 rounded-2xl flex items-center justify-center flex-col text-slate-500">
                <span class="text-4xl">+</span>
            </div>
            <div id="slot-2" class="slot h-40 rounded-2xl flex items-center justify-center flex-col text-slate-500">
                <span class="text-4xl">+</span>
        <div id="backpack-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4 mb-12">
</div>
        </div>

        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="bg-blue-500 w-2 h-6 block"></span> 我的背包 (點擊加入)
        </h2>
        <div id="backpack" class="grid grid-cols-4 md:grid-cols-6 gap-3">
            </div>
        <div id="evo-panel" class="hidden bg-slate-900 rounded-[2rem] p-8 border-2 border-slate-800 shadow-2xl">
            <div class="flex flex-col md:flex-row items-center gap-12">
                <div class="text-center">
                    <div id="detail-img" class="w-48 h-48 bg-contain bg-no-repeat bg-center mb-4"></div>
                    <h2 id="detail-name" class="text-3xl font-black">--</h2>
                    <p class="text-blue-400 mt-2">已答對：<span id="detail-count">0</span> 題</p>
                    <button onclick="simulateCorrect()" class="mt-6 bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full font-bold transition-all active:scale-95">模擬答對 +10 題</button>
                </div>

        <button id="start-battle" class="w-full mt-10 bg-red-600 py-4 rounded-full font-black text-2xl opacity-50 cursor-not-allowed">
            進入戰鬥！
        </button>
                <div class="flex-grow">
                    <h3 class="text-slate-500 font-bold mb-8 tracking-widest uppercase">進化型態與需求</h3>
                    <div id="evo-chain" class="flex items-start justify-between">
                        </div>
                </div>
            </div>
        </div>
</div>

<script>
        // 模擬從 Dexie.js 讀取的背包資料
        const myPokemon = [
            { id: 25, name: "皮卡丘", type: "電" },
            { id: 1, name: "妙蛙種子", type: "草" },
            { id: 4, name: "小火龍", type: "炎" },
            { id: 94, name: "耿鬼", type: "幽靈", recommended: true },
            { id: 133, name: "伊布", type: "一般" }
        // 進化設定：未來可從遊戲設定調整
        const EVO_CONFIG = { stage1: 50, stage2: 150 };

        // 預設 8 隻寶可夢資料庫
        const backpackData = [
            { id: 25, name: "皮卡丘", correctCount: 0, chain: [25, 26] },
            { id: 4, name: "小火龍", correctCount: 0, chain: [4, 5, 6] },
            { id: 7, name: "傑尼龜", correctCount: 0, chain: [7, 8, 9] },
            { id: 3, name: "妙蛙花", correctCount: 200, chain: [1, 2, 3] }, // 模擬已進化
            { id: 39, name: "胖丁", correctCount: 0, chain: [39, 40] },
            { id: 83, name: "大蔥鴨", correctCount: 0, chain: [83] }, // 無進化
            { id: 390, name: "小火焰猴", correctCount: 0, chain: [390, 391, 392] },
            { id: 447, name: "利歐路", correctCount: 0, chain: [447, 448] }
];

        let selectedTeam = [null, null, null];
        let currentSelectedIdx = null;

function initBackpack() {
            const container = document.getElementById('backpack');
            myPokemon.forEach(p => {
            const grid = document.getElementById('backpack-grid');
            grid.innerHTML = "";
            backpackData.forEach((p, idx) => {
const card = document.createElement('div');
                card.className = `poke-card bg-slate-800 p-2 rounded-xl border border-slate-700 flex flex-col items-center ${p.recommended ? 'is-recommended' : ''}`;
                card.className = "bg-slate-900 p-4 rounded-2xl border border-slate-800 flex flex-col items-center cursor-pointer hover:border-blue-500 transition-all";
                card.onclick = () => showDetail(idx);
                
                // 顯示目前進化型態 (根據答對數決定顯示哪一階)
                let currentEvoId = p.chain[0];
                if(p.correctCount >= EVO_CONFIG.stage2 && p.chain[2]) currentEvoId = p.chain[2];
                else if(p.correctCount >= EVO_CONFIG.stage1 && p.chain[1]) currentEvoId = p.chain[1];

card.innerHTML = `
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" class="w-16 h-16">
                    <span class="text-xs mt-1">${p.name}</span>
                    <div class="w-16 h-16 bg-contain bg-no-repeat bg-center mb-2" style="background-image:url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${currentEvoId}.png')"></div>
                    <span class="text-xs font-bold">${p.name}</span>
               `;
                card.onclick = () => addToTeam(p);
                container.appendChild(card);
                grid.appendChild(card);
});
}

        function addToTeam(p) {
            const emptySlotIndex = selectedTeam.indexOf(null);
            if (emptySlotIndex !== -1) {
                selectedTeam[emptySlotIndex] = p;
                updateSlots();
            } else {
                alert("隊伍已滿！點擊插槽可以更換。");
            }
        function showDetail(idx) {
            currentSelectedIdx = idx;
            const p = backpackData[idx];
            document.getElementById('evo-panel').classList.remove('hidden');
            document.getElementById('detail-name').innerText = p.name;
            document.getElementById('detail-count').innerText = p.correctCount;
            
            updateEvoDisplay(p);
}

        function updateSlots() {
            selectedTeam.forEach((p, i) => {
                const slot = document.getElementById(`slot-${i}`);
                if (p) {
                    slot.className = "slot slot-filled h-40 rounded-2xl flex items-center justify-center flex-col cursor-pointer";
                    slot.innerHTML = `
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" class="w-24 h-24">
                        <span class="text-xs font-bold text-yellow-400">${p.name}</span>
                    `;
                    slot.onclick = () => { selectedTeam[i] = null; updateSlots(); };
                } else {
                    slot.className = "slot h-40 rounded-2xl flex items-center justify-center flex-col text-slate-500";
                    slot.innerHTML = `<span class="text-4xl">+</span>`;
                    slot.onclick = null;
        function updateEvoDisplay(p) {
            const chainContainer = document.getElementById('evo-chain');
            chainContainer.innerHTML = "";
            
            p.chain.forEach((evoId, i) => {
                const step = document.createElement('div');
                step.className = "flex flex-col items-center w-24";
                
                const req = i === 0 ? 0 : i === 1 ? EVO_CONFIG.stage1 : EVO_CONFIG.stage2;
                const isLocked = p.correctCount < req;
                
                step.innerHTML = `
                    <div class="w-16 h-16 bg-contain bg-no-repeat bg-center ${isLocked ? 'locked' : ''}" style="background-image:url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${evoId}.png')"></div>
                    <p class="text-[10px] mt-2 ${isLocked ? 'text-slate-600' : 'text-green-400'}">${isLocked ? '需 ' + req + ' 題' : '已達成'}</p>
                    <div class="exp-bar w-full mt-2">
                        <div class="exp-fill" style="width: ${Math.min(100, (p.correctCount / (i === 0 ? 1 : req)) * 100)}%"></div>
                    </div>
                `;
                chainContainer.appendChild(step);
                
                if (i < p.chain.length - 1) {
                    const line = document.createElement('div');
                    line.className = "evo-path-line";
                    chainContainer.appendChild(line);
}
});

            // 檢查是否可以開始戰鬥
            const btn = document.getElementById('start-battle');
            if (selectedTeam.every(p => p !== null)) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.onclick = () => alert("即將帶著隊伍進入對戰舞台！");
            } else {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.onclick = null;
            // 更新大圖
            let currentEvoId = p.chain[0];
            if(p.correctCount >= EVO_CONFIG.stage2 && p.chain[2]) currentEvoId = p.chain[2];
            else if(p.correctCount >= EVO_CONFIG.stage1 && p.chain[1]) currentEvoId = p.chain[1];
            document.getElementById('detail-img').style.backgroundImage = `url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${currentEvoId}.png')`;
        }

        function simulateCorrect() {
            if(currentSelectedIdx !== null) {
                backpackData[currentSelectedIdx].correctCount += 10;
                document.getElementById('detail-count').innerText = backpackData[currentSelectedIdx].correctCount;
                updateEvoDisplay(backpackData[currentSelectedIdx]);
                initBackpack(); // 同步更新列表
}
}
