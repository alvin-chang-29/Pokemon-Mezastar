<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Poké-System Strategist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@400;900&display=swap');
        
        body {
            background: radial-gradient(circle at center, #0a192f 0%, #020617 100%);
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            color: #60a5fa;
        }

        .neon-border {
            border: 1px solid #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5), inset 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .stat-bar-bg { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); }
        .stat-bar-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); box-shadow: 0 0 10px #3b82f6; }

        /* 矩陣排版優化 */
        #matrix table { font-size: 10px; border-collapse: collapse; width: 100%; color: #94a3b8; }
        #matrix td, #matrix th { border: 1px solid rgba(59, 130, 246, 0.2); text-align: center; padding: 4px 0; }
        .highlight-col { background-color: rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="p-4 glass-panel flex justify-between items-center border-b border-blue-500/50">
        <div class="flex items-center gap-6">
            <h1 class="text-2xl font-black italic tracking-tighter text-white">STRATEGY_CORE <span class="text-blue-500">v4.0</span></h1>
        </div>
        <div class="flex gap-4">
            <button onclick="togglePocket()" class="neon-border px-6 py-2 rounded-full bg-blue-900/40 text-sm font-bold hover:bg-blue-600 transition">🎒 POKÉ_POCKET</button>
            <button onclick="document.getElementById('csvInput').click()" class="bg-blue-600/20 px-4 py-2 rounded-lg border border-blue-500 text-xs text-blue-300">IMPORT_EXCEL</button>
            <input type="file" id="csvInput" hidden accept=".csv,.txt">
        </div>
    </header>

    <main class="flex-1 flex p-4 gap-4 overflow-hidden">
        
        <section class="w-1/4 flex flex-col gap-4">
            <div class="glass-panel flex-1 rounded-3xl neon-border flex flex-col items-center justify-center p-6 relative overflow-hidden">
                <div class="absolute top-0 w-full h-1 bg-blue-400/50 animate-bounce"></div>
                <img id="enemyImg" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png" class="w-48 h-48 object-contain z-10 drop-shadow-[0_0_15px_#3b82f6]">
                <h2 id="enemyName" class="text-2xl font-black mt-6 tracking-widest text-white">MEWTWO</h2>
                <div id="enemyTypes" class="flex gap-2 mt-2"></div>
            </div>
            <button onclick="spawnRandomEnemy()" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg transition">INITIATE_SCAN</button>
        </section>

        <section class="w-2/4 flex flex-col glass-panel rounded-3xl neon-border p-4">
            <h3 class="text-center text-xs tracking-[0.4em] mb-4 text-blue-400">ANALYSIS_MATRIX_SYSTEM</h3>
            <div class="flex-1 overflow-auto rounded-xl bg-black/40 p-2" id="matrix"></div>
        </section>

        <section class="w-1/4 flex flex-col gap-4">
            <div class="glass-panel rounded-3xl neon-border p-4 flex-1 flex flex-col">
                <h3 class="text-xs font-bold mb-4 tracking-widest text-blue-400 border-l-2 border-blue-500 pl-2">COMMAND_ADVISOR</h3>
                <div id="recommendationList" class="flex-1 overflow-y-auto space-y-3"></div>
            </div>
        </section>
    </main>

    <div id="pocketModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-8 z-50">
        <div class="glass-panel rounded-[2.5rem] neon-border w-full max-w-6xl h-[85vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-blue-500/30 flex justify-between items-center bg-blue-900/20">
                <h2 class="text-2xl font-black text-white">DATA_ARCHIVE</h2>
                <button onclick="togglePocket()" class="text-4xl text-blue-500 hover:text-white">&times;</button>
            </div>
            <div class="flex-1 flex overflow-hidden">
                <div id="pocketList" class="w-1/3 border-r border-blue-500/20 overflow-y-auto p-4 space-y-3 bg-blue-900/10"></div>
                <div id="pocketDetail" class="w-2/3 p-10 overflow-y-auto bg-black/40 relative">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // --- 核心邏輯補全 ---
        const ALL_TYPES = ["一般","火","水","草","電","冰","格鬥","毒","地面","飛行","超能力","蟲","岩石","幽靈","龍","鋼","惡","妖精"];
        const TYPE_CHART = { /* 同前 v3 完整矩陣內容 */ };

        const db = new Dexie("PokeFutureDB");
        db.version(1).stores({ myPokemon: '++id, name, types, level, hp, atk, def, spAtk, spDef, speed, energy, moves, bio, customImg' });

        async function showDetail(id) {
            const p = await db.myPokemon.get(id);
            const detail = document.getElementById('pocketDetail');
            detail.innerHTML = `
                <div class="flex gap-8 items-start animate-fade-in">
                    <div class="w-1/2 flex flex-col items-center">
                        <div class="neon-border p-4 rounded-3xl bg-blue-900/20 mb-6">
                            <img src="${p.customImg || 'https://via.placeholder.com/200'}" class="w-64 h-64 object-contain">
                        </div>
                        <h2 class="text-4xl font-black text-white italic mb-2">${p.name}</h2>
                        <div class="flex gap-2 mb-4">${p.types.map(t => `<span class="px-3 py-1 border border-blue-400 text-blue-400 text-xs rounded-full">${t}</span>`).join('')}</div>
                    </div>
                    <div class="w-1/2 space-y-6">
                        <div class="grid grid-cols-2 gap-4 text-xs tracking-tighter">
                            <div class="bg-blue-900/30 p-3 rounded-lg border border-blue-500/30">ID: <span class="text-white">#${String(p.id).padStart(4,'0')}</span></div>
                            <div class="bg-blue-900/30 p-3 rounded-lg border border-blue-500/30">LEVEL: <span class="text-white">${p.level || 50}</span></div>
                            <div class="bg-blue-900/30 p-3 rounded-lg border border-blue-500/30 col-span-2">ENERGY: <span class="text-white">${p.energy || 100} EP</span></div>
                        </div>
                        <div class="space-y-3">
                            <h4 class="text-xs font-bold text-blue-400 uppercase">System Stats</h4>
                            ${renderStat('HP', p.hp)} ${renderStat('ATK', p.atk)} ${renderStat('DEF', p.def)}
                            ${renderStat('SP_ATK', p.spAtk)} ${renderStat('SP_DEF', p.spDef)} ${renderStat('SPD', p.speed)}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStat(label, val) {
            const width = Math.min((val / 255) * 100, 100);
            return `<div class="text-[10px] space-y-1">
                <div class="flex justify-between"><span>${label}</span><span class="text-white">${val}</span></div>
                <div class="w-full h-1.5 stat-bar-bg rounded-full overflow-hidden"><div class="h-full stat-bar-fill" style="width: ${width}%"></div></div>
            </div>`;
        }

        // 初始化與其他功能邏輯 (同前一版本代碼)...
        // ... (包含 initMatrix, spawnRandomEnemy, togglePocket, calculateAdvantage 等)
    </script>
</body>
</html>
