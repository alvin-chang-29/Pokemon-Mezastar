<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢對戰 v7.1 - 雙關卡挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@400;900&display=swap');
        body { background: #020617; font-family: 'Orbitron', 'Noto Sans TC', sans-serif; color: #60a5fa; overflow-x: hidden; margin: 0; }
        .glass-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.4); }
        
        /* 乘法表格 */
        .math-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .math-table td, .math-table th { border: 1px solid rgba(59, 130, 246, 0.3); text-align: center; height: 38px; font-size: 14px; }
        .math-table td:active { background: #3b82f6; }

        /* 大精靈球 OK 鍵 */
        .pokeball-giant { 
            width: 90px; height: 90px; background: linear-gradient(180deg, #ef4444 50%, #fff 50%); 
            border: 5px solid #333; border-radius: 50%; position: relative; cursor: pointer;
            margin: 20px auto; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); transition: transform 0.1s;
        }
        .pokeball-giant::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 5px; background: #333; transform: translateY(-50%); }
        .pokeball-giant::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 22px; height: 22px; background: white; border: 5px solid #333; border-radius: 50%; }
        .pokeball-giant:active { transform: scale(0.9); }

        .numpad-btn { @apply bg-blue-900/60 border border-blue-500/50 py-3 rounded-xl font-bold text-white text-xl active:bg-blue-400; }
        .step-label { @apply text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded-full mb-2 uppercase tracking-widest; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-2">

    <header class="p-3 glass-panel rounded-xl flex justify-between items-center mb-2">
        <button onclick="toggleSettings()" class="text-xl">⚙️</button>
        <h1 class="text-sm font-black italic text-white uppercase tracking-tighter">寶可夢對戰 v7.1</h1>
        <button onclick="togglePocket()" class="text-xl">🎒</button>
    </header>

    <section class="glass-panel rounded-2xl p-4 flex flex-col items-center justify-center mb-2 h-44">
        <img id="enemyImg" src="" class="w-24 h-24 object-contain">
        <h2 id="enemyZh" class="text-xl font-black text-white mt-1 italic">---</h2>
    </section>

    <main class="flex-1 flex flex-col gap-2 overflow-hidden">
        
        <div id="step1" class="glass-panel rounded-2xl p-2 flex-1 flex flex-col overflow-hidden">
            <div class="flex justify-between items-center px-2">
                <span class="step-label">Step 01: 找出對應格</span>
                <span id="quizTimer" class="text-red-500 font-black text-sm italic">60.0s</span>
            </div>
            <div id="quizDisplay" class="text-center text-2xl font-black text-white mb-2">9 × 8 = ?</div>
            <div class="flex-1 overflow-auto bg-black/40 rounded-xl" id="matrixBox">
                </div>
        </div>

        <div id="step2" class="glass-panel rounded-2xl p-4 flex-1 hidden flex flex-col items-center justify-center">
            <span class="step-label">Step 02: 輸入答案</span>
            <div id="quizDisplay2" class="text-3xl font-black text-white mb-4">9 × 8 = <span class="text-blue-400" id="userInput">?</span></div>
            
            <div class="grid grid-cols-3 gap-2 w-full max-w-[210px] mb-4">
                <button onclick="pressNum(1)" class="numpad-btn">1</button><button onclick="pressNum(2)" class="numpad-btn">2</button><button onclick="pressNum(3)" class="numpad-btn">3</button>
                <button onclick="pressNum(4)" class="numpad-btn">4</button><button onclick="pressNum(5)" class="numpad-btn">5</button><button onclick="pressNum(6)" class="numpad-btn">6</button>
                <button onclick="pressNum(7)" class="numpad-btn">7</button><button onclick="pressNum(8)" class="numpad-btn">8</button><button onclick="pressNum(9)" class="numpad-btn">9</button>
                <button onclick="pressNum('C')" class="numpad-btn text-red-400">C</button><button onclick="pressNum(0)" class="numpad-btn">0</button>
            </div>
            
            <div class="pokeball-giant" onclick="finalCheck()"></div>
        </div>

    </main>

    <section id="footerUI" class="glass-panel rounded-2xl p-3 flex items-center justify-around h-24 mt-2">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-16 h-16">
        <button id="startBtn" onclick="startBattle()" class="bg-yellow-500 text-blue-900 font-black px-10 py-3 rounded-full text-xl shadow-xl">開始對戰</button>
    </section>

    <div id="captureModal" class="fixed inset-0 bg-black/95 hidden flex flex-col items-center justify-center z-[500]">
        <img id="capturedImg" src="" class="w-56 h-56 animate-bounce">
        <h2 class="text-4xl font-black text-yellow-400 mt-6 italic">捕獲成功！</h2>
        <button onclick="location.reload()" class="mt-10 bg-blue-600 px-12 py-3 rounded-full text-white font-bold">繼續冒險</button>
    </div>

    <script>
        let config = { ko: 20, total: 60 };
        let quizA = 0, quizB = 0, quizAns = 0, currentInput = "";
        let timer = null, startTime = 0, currentEnemy = null;

        window.onload = () => { initMatrix(); spawnRandomEnemy(); };

        function initMatrix() {
            const box = document.getElementById('matrixBox');
            let h = `<table class="math-table"><thead><tr><th class="bg-blue-900/30">×</th>`;
            for(let i=1; i<=9; i++) h += `<th class="bg-blue-900/20">${i}</th>`;
            h += `</tr></thead><tbody>`;
            for(let i=1; i<=9; i++) {
                h += `<tr><th class="bg-blue-900/20">${i}</th>`;
                for(let j=1; j<=9; j++) h += `<td onclick="clickMatrix(${i*j})">${i*j}</td>`;
                h += `</tr>`;
            }
            box.innerHTML = h + `</tbody></table>`;
        }

        async function spawnRandomEnemy() {
            const id = Math.floor(Math.random() * 1025) + 1;
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const data = await res.json();
            const specRes = await fetch(data.species.url);
            const specData = await specRes.json();
            const zh = specData.names.find(n => n.language.name === "zh-Hant")?.name || data.name;
            currentEnemy = { zh, img: data.sprites.other["official-artwork"].front_default };
            document.getElementById('enemyZh').innerText = zh;
            document.getElementById('enemyImg').src = currentEnemy.img;
        }

        function startBattle() {
            document.getElementById('footerUI').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            newQuiz();
        }

        function newQuiz() {
            quizA = Math.floor(Math.random()*9)+1;
            quizB = Math.floor(Math.random()*9)+1;
            quizAns = quizA * quizB;
            document.getElementById('quizDisplay').innerText = `${quizA} × ${quizB} = ?`;
            document.getElementById('quizDisplay2').innerHTML = `${quizA} × ${quizB} = <span class="text-blue-400" id="userInput">?</span>`;
            startTime = Date.now();
            clearInterval(timer);
            timer = setInterval(updateTimer, 100);
        }

        function clickMatrix(val) {
            if(val === quizAns) {
                // 通過第一關，進入第二關
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } else {
                alert("位置不對喔，再找找！");
            }
        }

        function pressNum(n) {
            if(n === 'C') currentInput = ""; else currentInput += n;
            document.getElementById('userInput').innerText = currentInput || "?";
        }

        function finalCheck() {
            if(parseInt(currentInput) === quizAns) {
                let diff = (Date.now() - startTime)/1000;
                clearInterval(timer);
                if(diff <= config.ko) {
                    document.getElementById('capturedImg').src = currentEnemy.img;
                    document.getElementById('captureModal').classList.remove('hidden');
                } else {
                    alert("答對了！但時間太久寶可夢掙脫了，重來一次！");
                    location.reload();
                }
            } else {
                alert("數字不對喔！");
                currentInput = "";
                document.getElementById('userInput').innerText = "?";
            }
        }

        function updateTimer() {
            let remain = Math.max(0, config.total - (Date.now()-startTime)/1000);
            document.getElementById('quizTimer').innerText = `${remain.toFixed(1)}s`;
            if(remain <= 0) { clearInterval(timer); alert("逃走了..."); location.reload(); }
        }
    </script>
</body>
</html>
