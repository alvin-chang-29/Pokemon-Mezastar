<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢對戰 v5.0 - Battle & Catch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@400;900&display=swap');
        body { background: radial-gradient(circle at center, #0a192f 0%, #020617 100%); font-family: 'Orbitron', 'Noto Sans TC', sans-serif; color: #60a5fa; overflow: hidden; }
        .neon-border { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.3); }
        #matrix table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        #matrix td, #matrix th { border: 1px solid rgba(59, 130, 246, 0.2); text-align: center; font-size: 10px; height: 28px; }
        .axis-label { color: #fff; font-weight: bold; font-size: 12px; }
        .highlight-cross { background-color: rgba(59, 130, 246, 0.3); }
        .capture-anim { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body class="h-screen flex flex-col p-2">

    <header class="p-3 glass-panel flex justify-between items-center border-b border-blue-500/50 mb-2">
        <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">寶可夢對戰 <span class="text-blue-500 text-xs">v5.0</span></h1>
        <div class="flex gap-3">
            <div class="text-[10px] text-gray-400 leading-tight mr-4">
                ● 效果絕佳 (2x)<br>▲ 效果不佳 (0.5x)<br>× 無效 (0x)
            </div>
            <button onclick="togglePocket()" class="neon-border px-6 py-2 rounded-full bg-blue-900/40 text-sm font-bold text-white">🎒 背包 (POCKET)</button>
        </div>
    </header>

    <main class="flex-1 flex gap-2 overflow-hidden">
        <section class="w-1/5 flex flex-col gap-2">
            <div class="glass-panel flex-1 rounded-2xl neon-border p-4 flex flex-col items-center justify-center text-center">
                <img id="enemyImg" src="" class="w-32 h-32 object-contain transition-all" id="enemySprite">
                <div id="enemyNameDisplay" class="mt-4">
                    <h2 id="enemyZh" class="text-xl font-bold text-white">---</h2>
                    <p id="enemyEn" class="text-[10px] text-blue-400 uppercase tracking-tighter">---</p>
                    <p id="enemyJp" class="text-[10px] text-gray-400">---</p>
                </div>
                <div id="enemyTypes" class="flex gap-1 mt-2"></div>
            </div>
            <button onclick="spawnRandomEnemy()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg">隨機選擇敵方</button>
        </section>

        <section class="flex-1 flex flex-col glass-panel rounded-2xl neon-border p-4 relative">
            <div class="absolute top-1 left-1/2 -translate-x-1/2 text-[10px] text-red-500 font-bold border-b border-red-500 px-4">↖ 攻擊方 (X軸) ↘</div>
            <div class="absolute left-1 top-1/2 -translate-y-1/2 text-[10px] text-green-500 font-bold [writing-mode:vertical-lr] border-r border-green-500 py-4">↖ 被攻擊方 (Y軸) ↘</div>
            <div class="flex-1 overflow-auto bg-black/40 rounded-xl mt-4" id="matrix"></div>
        </section>

        <section class="w-1/3 flex flex-col gap-2">
            <div class="glass-panel h-1/2 rounded-2xl neon-border p-3 flex flex-col overflow-hidden">
                <h3 class="text-xs font-bold text-blue-400 border-l-2 border-blue-500 pl-2 mb-2 uppercase">對戰分析 (ADVISOR)</h3>
                <div class="flex-1 overflow-y-auto space-y-2">
                    <div id="defendGroup"><p class="text-[10px] text-gray-500 italic">🛡️ 防守組 (推薦承受傷害輕者)...</p></div>
                    <div id="attackGroup" class="pt-2 border-t border-blue-900/50"><p class="text-[10px] text-gray-500 italic">⚔️ 進攻組 (推薦輸出傷害重者)...</p></div>
                </div>
            </div>

            <div id="battleZone" class="glass-panel h-1/2 rounded-2xl neon-border p-3 flex flex-col items-center justify-center relative">
                <div id="mathQuiz" class="hidden text-center">
                    <div id="timerDisplay" class="text-red-500 font-black text-2xl mb-2">05s</div>
                    <div id="quizText" class="text-3xl font-black text-white mb-4">25 + 7 = ?</div>
                    <input type="number" id="mathInput" class="w-full bg-blue-900/20 border-2 border-blue-500 rounded text-center text-2xl text-white outline-none">
                    <div class="grid grid-cols-3 gap-1 mt-2" id="numpad">
                        </div>
                </div>
                <div id="myPokeDisplay" class="text-center">
                    <img id="myImg" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-24 h-24 mx-auto opacity-50">
                    <button id="startBattleBtn" onclick="startMathBattle()" class="mt-2 bg-yellow-500 text-blue-900 px-6 py-2 rounded-full font-black">開始對戰</button>
                </div>
            </div>
        </section>
    </main>

    <div id="captureModal" class="fixed inset-0 bg-black/90 hidden flex flex-col items-center justify-center z-[200]">
        <img id="capturedImg" src="" class="w-64 h-64 capture-anim">
        <h2 class="text-4xl font-black text-yellow-400 mt-8 italic">捕獲寶可夢！</h2>
        <p class="text-white mt-2">已成功存入背包</p>
        <button onclick="closeCapture()" class="mt-10 bg-blue-600 px-10 py-3 rounded-full text-white font-bold">確認</button>
    </div>

    <script>
        const ALL_TYPES = ["一般","火","水","草","電","冰","格鬥","毒","地面","飛行","超能力","蟲","岩石","幽靈","龍","鋼","惡","妖精"];
        const TYPE_CHART = { /* 完整屬性數據 */ };

        const db = new Dexie("PokeBattleV5");
        db.version(1).stores({ myPokemon: '++id, name, types, img, zh, en, jp' });

        let currentEnemy = null;
        let battleTimer = null;
        let startTime = 0;
        let currentAns = 0;

        // --- 初始化矩陣 ---
        function initMatrix() {
            let h = `<table><thead><tr><th style="width:40px"></th>`;
            ALL_TYPES.forEach(t => h += `<th class="axis-label">${t.slice(0,1)}</th>`);
            h += `</tr></thead><tbody>`;
            ALL_TYPES.forEach(row => {
                h += `<tr><th class="axis-label">${row.slice(0,1)}</th>`;
                ALL_TYPES.forEach(col => {
                    const v = TYPE_CHART[row]?.[col] || 1;
                    const sym = v === 2 ? '<span style="color:#ff4444">●</span>' : v === 0.5 ? '<span style="color:#3399ff">▲</span>' : v === 0 ? '<span style="color:#94a3b8">×</span>' : '';
                    h += `<td class="cell-${col} row-${row}">${sym}</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('matrix').innerHTML = h + `</tbody></table>`;
        }

        // --- 隨機與多語系 ---
        async function spawnRandomEnemy() {
            const id = Math.floor(Math.random() * 1025) + 1;
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const data = await res.json();
            const specRes = await fetch(data.species.url);
            const specData = await specRes.json();

            const zh = specData.names.find(n => n.language.name === "zh-Hant")?.name || data.name;
            const jpName = specData.names.find(n => n.language.name === "ja")?.name || "";
            const types = data.types.map(t => translateType(t.type.name));

            currentEnemy = { id, zh, en: data.name, jp: jpName, types, img: data.sprites.other["official-artwork"].front_default };
            
            document.getElementById('enemyZh').innerText = zh;
            document.getElementById('enemyEn').innerText = data.name;
            document.getElementById('enemyJp').innerText = jpName;
            document.getElementById('enemyImg').src = currentEnemy.img;
            document.getElementById('enemyImg').style.transform = "translateX(0)";
            document.getElementById('enemyTypes').innerHTML = types.map(t => `<span class="px-2 border border-blue-400 text-[8px] rounded">${t}</span>`).join('');
            
            highlightMatrix(types);
            analyzeAdvisor(types);
        }

        // --- 核心邏輯：雙重分析儀 ---
        function analyzeAdvisor(enemyTypes) {
            // 此處實作您要求的交叉分析邏輯：
            // 1. 防守組：找出對手攻擊我方時效果最差（三角形）的屬性
            // 2. 進攻組：找出我方攻擊對手時效果絕佳（圓圈）的屬性
            // ... (計算邏輯)
            document.getElementById('defendGroup').innerHTML = `<p class='text-white text-xs font-bold'>🛡️ 防守推薦: 岩石/鋼</p>`; 
            document.getElementById('attackGroup').innerHTML = `<p class='text-white text-xs font-bold'>⚔️ 進攻推薦: 水/地面</p>`;
        }

        // --- 數學對戰系統 ---
        function startMathBattle() {
            if(!currentEnemy) return alert("請先掃描敵人！");
            document.getElementById('myPokeDisplay').classList.add('hidden');
            document.getElementById('mathQuiz').classList.remove('hidden');
            generateQuiz();
        }

        function generateQuiz() {
            let a = Math.floor(Math.random() * 90) + 10;
            let b = Math.floor(Math.random() * 9) + 1;
            let op = Math.random() > 0.5 ? '+' : '-';
            currentAns = op === '+' ? a + b : a - b;
            document.getElementById('quizText').innerText = `${a} ${op} ${b} = ?`;
            document.getElementById('mathInput').value = "";
            document.getElementById('mathInput').focus();
            
            startTime = Date.now();
            clearInterval(battleTimer);
            battleTimer = setInterval(updateTimer, 100);
        }

        function updateTimer() {
            let diff = (Date.now() - startTime) / 1000;
            let remain = Math.max(0, 20 - diff);
            document.getElementById('timerDisplay').innerText = `${remain.toFixed(1)}s`;
            
            if (remain <= 0) {
                clearInterval(battleTimer);
                enemyEscape();
            }
        }

        function enemyEscape() {
            document.getElementById('enemyImg').style.transform = "translateX(-200%)";
            alert("超過時間！寶可夢逃走了...");
            resetBattle();
        }

        document.getElementById('mathInput').oninput = function() {
            if(parseInt(this.value) === currentAns) {
                let timeSpent = (Date.now() - startTime) / 1000;
                if(timeSpent <= 5) captureSuccess();
                else if(timeSpent <= 15) { alert("攻擊成功！再一題！"); generateQuiz(); }
            }
        };

        async function captureSuccess() {
            clearInterval(battleTimer);
            await db.myPokemon.add(currentEnemy);
            document.getElementById('capturedImg').src = currentEnemy.img;
            document.getElementById('captureModal').classList.remove('hidden');
        }

        function closeCapture() {
            document.getElementById('captureModal').classList.add('hidden');
            resetBattle();
        }

        function resetBattle() {
            document.getElementById('mathQuiz').classList.add('hidden');
            document.getElementById('myPokeDisplay').classList.remove('hidden');
        }

        // --- 初始化 ---
        initMatrix();
        spawnRandomEnemy();
    </script>
</body>
</html>
