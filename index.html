<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>乘法引導測試 - 模組 v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 乘數/被乘數紅框 */
        .header-highlight {
            border: 4px solid #ef4444 !important;
            border-radius: 8px;
            position: relative;
            z-index: 50;
        }
        /* 乘積目標格綠色閃爍 */
        .product-flash {
            animation: success-pulse 0.6s infinite alternate;
            border: 4px solid #22c55e !important;
            box-shadow: 0 0 15px #22c55e;
            z-index: 60;
        }
        @keyframes success-pulse {
            from { background-color: rgba(34, 197, 94, 0.2); transform: scale(1); }
            to { background-color: rgba(34, 197, 94, 0.9); transform: scale(1.1); }
        }
        /* 行列亮帶（淡淡的紅色引導孩子視線移動） */
        .guide-line { background-color: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen">

    <div class="bg-slate-900 p-8 rounded-[2rem] shadow-2xl border-2 border-slate-800">
        <div class="text-center mb-6">
            <h2 class="text-yellow-400 text-2xl font-bold mb-2">Step 1: 定位目標</h2>
            <div class="flex justify-center items-center gap-4 text-5xl font-black">
                <span class="text-red-500 border-2 border-red-500 px-3 rounded-lg" id="valA">1</span>
                <span>×</span>
                <span class="text-red-500 border-2 border-red-500 px-3 rounded-lg" id="valB">9</span>
                <span class="text-white">=</span>
                <span class="text-green-500" id="valTarget">?</span>
            </div>
        </div>

        <div id="grid" class="grid grid-cols-10 gap-1 bg-slate-800 p-3 rounded-xl">
            </div>
        
        <p class="mt-6 text-slate-400 text-center">💡 引導：沿著紅色數字延伸，點擊綠色閃爍的答案位置！</p>
    </div>

    <script>
        const a = 1; // 測試 1x9
        const b = 9;
        const gridEl = document.getElementById('grid');

        function createGrid() {
            for (let r = 0; r <= 9; r++) {
                for (let c = 0; c <= 9; c++) {
                    const cell = document.createElement('div');
                    cell.className = "w-12 h-12 flex items-center justify-center font-bold text-lg transition-all";
                    
                    if (r === 0 && c === 0) {
                        cell.innerText = "";
                    } else if (r === 0) {
                        // 頂部 X 軸 (被乘數)
                        cell.innerText = c;
                        cell.className += " text-blue-400";
                        if (c === b) cell.classList.add('header-highlight'); // 紅框標示
                    } else if (c === 0) {
                        // 左側 Y 軸 (乘數)
                        cell.innerText = r;
                        cell.className += " text-red-400";
                        if (r === a) cell.classList.add('header-highlight'); // 紅框標示
                    } else {
                        // 內容格
                        cell.className += " bg-slate-700 rounded-md";
                        // 判斷是否為交叉點 (乘積)
                        if (r === a && c === b) {
                            cell.classList.add('product-flash'); // 綠色閃爍引導
                            cell.onclick = () => {
                                document.getElementById('valTarget').innerText = a * b;
                                alert("完美定位！孩子學會了： " + a + " x " + b + " = " + (a*b));
                            };
                        } else if (r === a || c === b) {
                            cell.classList.add('guide-line'); // 淡淡的紅色引導帶
                        }
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        createGrid();
    </script>
</body>
</html>
