<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢對戰 v7.2 - 閃爍引導版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@400;900&display=swap');
        body { background: #020617; font-family: 'Orbitron', 'Noto Sans TC', sans-serif; color: #60a5fa; overflow-x: hidden; margin: 0; }
        .glass-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.4); }
        
        /* 乘法表格與閃爍動畫 */
        .math-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .math-table td, .math-table th { border: 1px solid rgba(59, 130, 246, 0.2); text-align: center; height: 38px; font-size: 14px; position: relative; }
        
        .guide-flash { animation: guideFlash 1s infinite; }
        @keyframes guideFlash {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(59, 130, 246, 0.4); box-shadow: inset 0 0 10px #3b82f6; }
        }

        /* 大精靈球 OK 鍵 */
        .pokeball-giant { 
            width: 100px; height: 100px; background: linear-gradient(180deg, #ef4444 50%, #fff 50%); 
            border: 6px solid #333; border-radius: 50%; position: relative; cursor: pointer;
            margin: 20px auto; box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); transition: transform 0.1s;
        }
        .pokeball-giant::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 6px; background: #333; transform: translateY(-50%); }
        .pokeball-giant::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; background: white; border: 6px solid #333; border-radius: 50%; }
        .pokeball-giant:active { transform: scale(0.9); }

        .numpad-btn { @apply bg-blue-900/60 border border-blue-500/30 py-4 rounded-2xl font-black text-white text-2xl active:bg-blue-500; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-2 overflow-hidden">

    <header class="p-3 glass-panel rounded-xl flex justify-between items-center mb-2">
        <button onclick="toggleSettings()" class="text-xl">⚙️</button>
        <h1 class="text-xs font-black italic text-white tracking-widest uppercase">Poké-Battle <span class="text-blue-500">v7.2</span></h1>
        <button onclick="togglePocket()" class="text-xl">🎒</button>
    </header>

    <section class="glass-panel rounded-2xl p-4 flex flex-col items-center justify-center mb-2 h-44">
        <img id="enemyImg" src="" class="w-24 h-24 object-contain">
        <h2 id="enemyZh" class="text-xl font-black text-white mt-1 italic tracking-widest">READY</h2>
    </section>

    <main class="flex-1 flex flex-col gap-2 overflow-hidden">
        
        <div id="step1" class="glass-panel rounded-2xl p-2 flex-1 flex flex-col overflow-hidden hidden">
            <div class="flex justify-between items-center px-2 mb-1">
                <span class="text-[10px] bg-blue-600 px-2 py-0.5 rounded-full text-white uppercase font-bold">Step 01</span>
                <span id="quizTimer" class="text-red-500 font-black text-lg italic">60.0s</span>
            </div>
            <div id="quizDisplay" class="text-center text-3xl font-black text-white mb-2">---</div>
            <div class="flex-1 overflow-auto bg-black/40 rounded-xl" id="matrixBox"></div>
        </div>

        <div id="step2" class="glass-panel rounded-2xl p-4 flex-1 hidden flex flex-col items-center justify-center">
            <span class="text-[10px] bg-green-600 px-2 py-0.5 rounded-full text-white uppercase font-bold mb-4">Step 02</span>
            <div id="quizDisplay2" class="text-3xl font-black text-white mb-6">---</div>
            
            <div class="grid grid-cols-3 gap-3 w-full max-w-[240px] mb-4">
                <button onclick="pressNum(1)" class="numpad-btn">1</button><button onclick="pressNum(2)" class="numpad-btn">2</button><button onclick="pressNum(3)" class="numpad-btn">3</button>
                <button onclick="pressNum(4)" class="numpad-btn">4</button><button onclick="pressNum(5)" class="numpad-btn">5</button><button onclick="pressNum(6)" class="numpad-btn">6</button>
                <button onclick="pressNum(7)" class="numpad-btn">7</button><button onclick="pressNum(8)" class="numpad-btn">8</button><button onclick="pressNum(9)" class="numpad-btn">9</button>
                <button onclick="pressNum('C')" class="numpad-btn text-red-400">C</button><button onclick="pressNum(0)" class="numpad-btn">0</button>
            </div>
            
            <div class="pokeball-giant" onclick="finalCheck()"></div>
        </div>

        <div id="analysisBox" class="glass-panel rounded-2xl p-4 flex-1 flex flex-col overflow-hidden">
             <div class="text-center text-xs text-blue-400 mb-2 italic">屬性弱點分析中...</div>
             <div id="analysisContent" class="overflow-auto flex-1"></div>
        </div>

    </main>

    <section id="footerUI" class="glass-panel rounded-2xl p-4 flex items-center justify-around h-28 mt-2">
        <img id="myImg" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-16 h-16 drop-shadow-[0_0_10px_gold]">
        <button id="startBtn" onclick="startBattle()" class="bg-yellow-500 text-blue-900 font-black px-12 py-4 rounded-full text-2xl shadow-xl active:scale-95 transition">開始對戰</button>
    </section>

    <script>
        let config = { ko: 20, total: 60 };
        let quizA = 0, quizB = 0, quizAns = 0, currentInput = "";
        let timer = null, startTime = 0, currentEnemy = null;

        window.onload = () => { spawnRandomEnemy(); };

        async function spawnRandomEnemy() {
            const id = Math.floor(Math.random() * 1025) + 1;
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const data = await res.json();
            const specRes = await fetch(data.species.url);
            const specData = await specRes.json();
            const zh = specData.names.find(n => n.language.name === "zh-Hant")?.name || data.name;
            currentEnemy = { zh, img: data.sprites.other["official-artwork"].front_default };
            document.getElementById('enemyZh').innerText = zh;
            document.getElementById('enemyImg').src = currentEnemy.img;
            // 平時顯示屬性表
            renderAttributeMatrix();
        }

        function startBattle() {
            document.getElementById('footerUI').classList.add('hidden');
            document.getElementById('analysisBox').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            
            // 隨機出題
            quizA = Math.floor(Math.random()*9)+1;
            quizB = Math.floor(Math.random()*9)+1;
            quizAns = quizA * quizB;
            
            document.getElementById('quizDisplay').innerText = `${quizA} × ${quizB} = ?`;
            renderMultiplicationTable(quizA, quizB);
            
            startTime = Date.now();
            timer = setInterval(updateTimer, 100);
        }

        // 渲染九九乘法表並加入閃爍導航
        function renderMultiplicationTable(targetA, targetB) {
            const box = document.getElementById('matrixBox');
            let h = `<table class="math-table"><thead><tr><th class="bg-blue-900/40">×</th>`;
            for(let i=1; i<=9; i++) {
                // 如果是目標列，加入閃爍
                const flashClass = (i === targetB) ? 'guide-flash' : '';
                h += `<th class="bg-blue-900/20 ${flashClass}">${i}</th>`;
            }
            h += `</tr></thead><tbody>`;
            for(let i=1; i<=9; i++) {
                const rowFlash = (i === targetA) ? 'guide-flash' : '';
                h += `<tr><th class="bg-blue-900/20 ${rowFlash}">${i}</th>`;
                for(let j=1; j<=9; j++) {
                    // 如果剛好是交叉點，可以加強視覺
                    const isCorrect = (i === targetA && j === targetB);
                    h += `<td onclick="clickMatrix(${i*j}, ${isCorrect})">${i*j}</td>`;
                }
                h += `</tr>`;
            }
            box.innerHTML = h + `</tbody></table>`;
        }

        function clickMatrix(val, isCorrect) {
            if(isCorrect) {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('quizDisplay2').innerHTML = `${quizA} × ${quizB} = <span class="text-blue-400" id="userInput">?</span>`;
            } else {
                // 答錯提示 (不跳出 alert 以免中斷節奏，改用震動或變色)
                document.getElementById('quizDisplay').classList.add('text-red-500');
                setTimeout(()=>document.getElementById('quizDisplay').classList.remove('text-red-500'), 500);
            }
        }

        // 其餘邏輯 (updateTimer, pressNum, finalCheck) 維持 v7.1 ...
        function updateTimer() {
            let remain = Math.max(0, config.total - (Date.now()-startTime)/1000);
            document.getElementById('quizTimer').innerText = `${remain.toFixed(1)}s`;
            if(remain <= 0) { clearInterval(timer); alert("逃走了..."); location.reload(); }
        }
        function pressNum(n) {
            if(n === 'C') currentInput = ""; else currentInput += n;
            document.getElementById('userInput').innerText = currentInput || "?";
        }
        function finalCheck() {
            if(parseInt(currentInput) === quizAns) {
                clearInterval(timer);
                alert("收服成功！");
                location.reload();
            } else { alert("再試一次密碼！"); currentInput = ""; }
        }
        function renderAttributeMatrix() {
            // 平時顯示屬性分析邏輯...
            document.getElementById('analysisContent').innerHTML = "<p class='text-center p-10'>點擊下方開始對戰進行測試</p>";
        }
    </script>
</body>
</html>
